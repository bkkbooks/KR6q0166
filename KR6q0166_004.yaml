body:
  text: 京都柏林嗣祖沙門性音重編蓋大殿黃面老子眼𥉌眵千方百計討便宜而今無著渾身處却要兒孫蓋覆伊松源嶽瞿曇老子面皮黃一箇渾身沒處藏普請為渠遮蓋去免教赤體露堂堂秀嵒瑞挂鐘重似鴻毛輕似山當陽挂起大家看一聲直透威音外撼動一天星斗寒浙翁𤥎一模脫就轉風流平地教休不肯休要得洪音喧宇宙直須更上一層樓枯禪鏡五十三參壁幸得十方無壁落誰將五彩畫虗空善財眼裏生花翳去却一重又一重西嵓慧鑄鐘通身祇是一張口百鍊爐中輥出來斷送夕陽歸去後又催明月上樓臺雪嵓欽大爐鞴裏翻身出不犯鉗錘勢萬鈞一擊清風遍寰宇喚回多少夢中人簡菴清大爐鞴裏翻身轉開口當知有賞音多少師僧齊側耳聽渠號令震叢林呆菴莊化藏八面渾無刀斧痕堆金抹緑要爭新出門遇著經綸手撥轉如來正法輪瞿曇老賊口親屙驢屎相兼馬屎多打得一團都撥轉潑天臭氣奈渠何長翁淨化燈一點光明未發輝燈籠露柱暗攢眉驀然觸著星兒子照破瞿曇鐵面皮簡堂機點著心光便發花從教千古照河沙假饒大地毗嵐起到底如何滅得他谷源道劫初一點光明種猛烈工夫拶出來瀉入碧琉璃裏去百千諸佛笑顏開唯菴然水燈萬里煙波接素秋銀釭耿耿泛中流自從一點光明見逐浪隨波未肯休癡絶沖血書蓮經大丈夫兒皮有血自家針劄自家知一毫頭上能通變紅菡萏花三四枝雲谷寫經以字不成八字非當陽拈出大家知釋迦老子舌無骨黃葉拈來嚇小兒雲巢嵓焙經始終鹿苑跋提河四十餘年口過多爐炭上頭遭拔舌莫言有罪不重科黃龍南寫法華塔為僧此經一字何曾有莫寫浮屠謗老胡若謗老胡終有報定教鬚髮一莖無谷源道化鹽紅爐鼓浪立教乾突出銀山照膽寒便是馬師胡亂後要須不被舌頭瞞松源嶽合水和泥一處烹水乾泥盡雪花生乘時索起撩天價公驗分明孰敢爭潛菴光化柴一刀兩段絶誵訛未免依然入草窩直得通身紅爛後變生作熟總由他浙翁𤥎化炭黑漆渾身鐵面皮當頭觸著火星飛檀那切莫輕酬價煆聖鎔凡總是伊復菴賀澤藏山修涅盤堂把針閣贖所溺坑等緣涅盤一路盡掀翻觸處工夫見不難洗面驀然摸著鼻繡針眼裏好藏山會藏主求度天書入手頂門開解道心空及第來翻笑當年負舂老半生擔閣在黃梅浙翁𤥎我儂嫌佛不肯做子要伽黎搭半肩一等共行山下路眼頭各自看風煙天目禮化浴渾身脫下赤條條滿杓盛來癢處澆但得通身冷汗出自然百病一時消竹菴圭洗到無塵垢轉多杓頭拋下看如何對人不是揚家醜祇要添柴助熱鍋標指堂化馬祖殿瓦寄語江西老古錐從教日炙與風吹不是兒孫無料理要見冰消瓦解時土竺悟二德彬修雙陽塔求頌九層塔聳青霄外七佛靈蹤在上方山冷雲寒當午夜惟聞天樂散天香老僧乞偈募龕藏身無地復何藏冰骨仙人玉作裳佛眼謾云窺不見分明北斗曬斜陽梅逢忍修船生死河邊箇破舟七穿八落半沉浮娑婆業海風波惡苦勸諸君努力修孤雲鑑重鞔法鼓膽在渾身肯便藏惡聲一任播諸方乾坤未信知音少骨露皮穿總不妨呆翁悅鄮嶺接待玉几峯高難措足行人多向半途休無棲泊處開門戶箇箇教伊到地頭佛照光大亭接待裝泗洲潮生潮落三江口人去人來四路頭放下便知安樂處泗洲元不在揚州無準範大芙蓉接待水雲何處覓行蹤踏遍天台雁宕峯腳力盡時消息盡小芙蓉接大芙蓉無準範風月接待不蓄莖虀并粒米要餐風月任從伊莫嫌冷淡無滋味一飽能消萬劫饑商源雞鳴接待一粒米從檀度乞一莖菜是別人栽家私不與諸方比也要開門接往來商隱豫黃漢嶺開接待路繞懸崖萬仞頭行人到此一場愁驀然得箇休歇處重疊關山信腳遊高原泉漁浦接待吳山那畔越山前有飯充饑有榻眠到此便能休歇去帝鄉猶隔一潮船絶岸湘進月軒桂輪孤朗碧天寬簾卷清風入座寒底事明明人不薦又隨花影上欄杆大川濟留江心孤嶼江心浪潑天漁翁來看釣魚船煙蓑雨笠渾無用收卷絲綸展腳眠竹菴圭三教圖各立門庭各自尊談禪談道又談文桃紅李白薔薇紫畢竟根苗一樣春雲山三笑圖三箇難分劣與優你心頭似我心頭不堪說破祇堪笑笑到驢年未肯休無準範二祖圖等是清平世界人為因閒事長無明使他箇箇能安分圖上緣何有姓名宗派圖虗名驚世刻舟痕乃祖初無一法存流出胸中蓋天地祇今子子又孫孫東山源列派分宗定此圖繩繩相貫若聯珠不知佛祖未興日還有許多消息無癡絶冲枯松圖瘦骨槎牙耐歲寒碧雲深處老龍蟠笑他摘葉尋枝者到此如何著手攀谷源道選佛圖百千諸佛及衆生休向圖中強較量心印當陽輕擲出堂堂端坐寂光場一源靈題天目弔和菴主西丘老人八十餘頭髮白盡黃牙疏買得扁舟如葉大哭和菴主過東湖竺元道大義渡白頭望盡萬重山曠劫恩波徹底乾不是胸中藏忤逆出家端的報親難天目禮歸湖上鳥不驚飛水不流碧潭空濶冷涵秋一絲頭上無香餌風輥蘆花落釣舟石菴玸海山寄興午窗定起晝沉沉觸目虗凝一片心好鳥關關知我意盡情啼破緑楊陰大歇謙翠嵓寺野僧迎客下煙嵐試問如何是翠嵓門近洪崖千尺井石橋分水繞松杉張無盡三塔山前三塔要重修凡聖齊教著地頭肯似疏山窮鬼子一錢不使逞風流或菴體善權洞嵓下寒泉曲有聲洞中丹竈紫霞生現成門戶入不得白日茫茫把火行雪山登祝融峯南嶽諸峯七十二惟有祝融峯最高九千七百三十丈下視寰海如秋毫虗堂愚二岷峩華頂遠俯伏九華五老來相朝上方老僧日無事興來以手摩雲霄東林白薝蔔花露滴滴碧苾芻草香濛濛田地更無塵一點是何人合住其中禪月一山南北煙霞裏兩寺東西林麓間開眼如今渾似夢莫言真箇在盧山竹菴圭西林橫看成嶺直成峯向背高低各不同不識廬山真面目祇緣身在此山中蘇東坡作家爐鞴烹佛祖客來更撾茶毒鼓昨夜南山鱉鼻蛇咬殺大雄白額虎竹菴圭一作題雪峯鱉鼻菴毒氣炎炎未肯休草中交輥沒蹤由如今橫在平坡上誰敢當先摸鼻頭詠大椒萬木凋殘方吐𧰟埀埀先實綴枝頭從來辣性天然在嚼著通身白汗流夢菴格呈遠録公誰能一日兩梳頭撮得髻根牢便休大抵還他肌骨好不搽紅粉也風流圓通秀丈亭青山歷歷映江流半見明州半越州亭下寒潮亭上客不知來往幾時休朴翁銛涅槃臺當陽立箇鬼門關未死偷心過者難火急翻身開得眼屋頭元是舊青山生香亭一種靈苗發秀時須知花綻不萌枝其間氣息難藏處不假春風特地吹生公石講經聲在轆轤間要見生公却又難一曲欄杆千古意老僧無語石頭頑荷葉沼徹骨貧來更有誰鬖壞衲藕絲垂春風池面添新緑又見冰蠶作繭時遇物令人仰祖風弊衣遺在一池中秋風吹破春風補不犯清波一線功他山堰截斷寒流疊石基海潮從此作回期行人自老青山在㵎闊水聲無絶時隱山破草鞋踏遍山邊與水邊歸來脫向法堂前僧參不用袈裟裹問汝何時腳底穿夢菴格和菴主故居影落深雲不自名午香菰米雜黃精不知那裏缺綿密長有人來問二靈象潭泳三生石去來今世互相瞞休弄精魂業識團一片石頭遭帶纍幾人來拂蘚痕看一聲軒瓦礫聲中喪髑髏門風從此轉蕭條最憐萬竹當欄立雨洗風磨恨不消棋盤石明明黑白未分來一片方方嶮似崖試向機前投著看春風春雨幾莓苔蘇公隄春風細細柳抽條十里湖光落畫橈覿面坡仙知蹉過古祠猶在第三橋龍湫瀑布懸崖萬丈似危簷放下珠簾六月寒幾度風來半遮掩不容收卷祇容看龍鼻水洞裏當中忽迸開磷磷青石滑如苔五湖四海翻桃浪盡向鼻端流出來石龍滴滴鼻中水二十名泉䫫莫齊白髮老僧貪潄齒杖黎日日過嵓西橫川珙石臺天地生來本現成最稜層處坦然平其中自有點頭底祇是無人解講經老馬營司牽浴柳邊池吐沫垂涎步較遲洗見箭瘢知有恨將軍忘却未侯時藏雲二桃源圖綵雲綻處落欹斜雞犬無聲祇幾家五百年中興廢事紛紛紅雨落桃花牛圖三三五五戲平蕪踏裂春風百草枯莫寫溈山僧某甲恐人喚作祖師圖希叟曇中峯狐猿呌落中巖月野客吟殘半夜燈此景此時誰會得白雲深處坐禪僧無量壽妙高臺鴛鷺池塘芳草雨綺羅簾幕杏花風何如月在欄杆夜長嘯一聲千嶂中蘿月瑩松枯石老凍雲摧到此虗空漸覺低腳力盡時情興遠與誰𢹂手上天梯虗堂愚琉璃泡觀音一氣工夫做出來圓陀陀地絶纖埃都盧一箇圓通境門戶不將容易開古梅友二血書金剛經入佛腹藏點點滴滴娘生血狼狼藉藉給孤園盡大地人收不得依然返本又還源燈華休將春色擬栽培脫略人工巧翦裁遊子滿園覓不得祇因伊向火中開磬山修𪹼竹看取當場手眼親胸中毒氣種來深借他一點無明種擊碎千層與萬層箬菴問紙裹麻纏解不開因緣時至出頭來一聲霹靂驚天地曠劫無明當下灰愍生念燈籠靈明豈藉三光照慣向昏衢立大功祇為寸心恆不昧輝天鑑地自玲瓏琅琊真破衲零零落落幾經年信手拈來搭半肩午夜定回和束倒箇中消息許誰傳柏嵓凝住山將就度流年窮漢家私不直錢一領衲衣冬又夏熱來脫却冷來穿箬菴問二破被長將破被蒙頭臥地老天荒總不知此是死心真受用失便宜也得便宜觸衣碎甚作不挂寸𮈔方免寒何須特地裊長竿而今落落零零也七佛之名何處安印首座走馬燈團團馳走不停留無箇明人指路頭滅却心中些子火刀槍人馬一齊休無際悟槍如雨刺馬如風殺入重圍不放鬆不是不容針劄空目前住腳幾英雄養菴心業風吹得走如梭鬬勝爭強不放過未得中間星火盡不知何日息干戈且菴芻破錢半輪殘月掩塵埃依稀猶有開元字暗想清光未破時買盡人間不平事毗陵女子芳塘芳塘雨霽緑初肥折得青條串露歸一樹殘花喧鬬紅香滿徑撲人飛天隱至漁父籃裏無魚缺酒錢酒家留下釣漁船幾回欲脫蓑衣當又恐明朝是雨天西湖僧過天目山活埋菴自古名高纍不輕飲牛終是上流清吾師未死先埋却又向巢由頂上行紫柏可宿永慶寺建文帝杖錫南遊歲月深山雲水月傍閒吟塵心消盡無些子不受人間物色侵建文帝宿深村行行一宿深村裏雞犬豐年閙如市黃昏見客合家喜月下取魚戽塘水禪月三深山逢老僧衲衣線麁心似月自把矩鉏同榾柮青石溪邊踏葉行數片雲隨兩眉雪臨川道中出谷入谷路回轉秋風已至歸期晚舉頭何處望來蹤萬仞千山鳥飛遠宿雪峯菴雪深麋鹿無行跡雲外樵歸何處笛老禪騎虎不驚人猿拾荒苔挂高石笑隱欣虎丘禮隆祖塔爪牙曾展此峰頭睡虎耽耽莫敢儔千古知恩誰箇是空階落葉響深秋牧雲門送可生禪人省親六尺堂堂稟最靈此身來處要分明春風送上新安路一片依依望母情受業處題偈行腳古佛放光留不住鐵牛無腳也須行雖然未踏曹溪路且喜今朝離火坑大慧杲宿北山贈唯山主載雲松老響晴濤數轉溪灣見把茅深閉竹籬春不管亂啼山鳥踏花稍三宜盂臨平道中風蒲獵獵弄輕柔欲立蜻蜓不自由五月臨平山下路藕花無數滿汀洲道潛舁母渡錢塘母在籃輿子在途子行不上母先呼斷橋流水斜陽外羞見寒林返哺烏己恭行石門道中枝頭蜀魄一聲聲百里春山送又迎拈得泐潭潭上月直教千古照人清古雪登維摩金粟堂憶洞聞和尚青山滿目祇如前初地尋師憶往年不二法門無異相空庭添得草芊芊牧雲門暢情花無長在樹人無長在世有花須當賞有酒須當醉秋霜上𩯭來春風吹不去鄧青陽普請罷書偈茶芽蔍蔌初離焙筍角狼忙又吐泥山舍一年春事辦得閒誰管版頭低志芝菴主遣興小鍋煮菜上蒸飯菜熟飯香人正饑一補饑瘡了無事明朝依樣畫貓兒祖某主自適雪裏梅花春信息池中月色夜精神年來可是無佳趣莫把家風舉似人懶菴樞偶成簷頭密布蜘蛛網砌下高堆曲蟺泥達磨眼睛渾不顧尋常讀作一聯詩中峰本二秋雲片片秋空闊秋葉沉沉秋雨寒林下野人難曬㫰眉毛終日不曾乾遣興逸興應須效皎然此生瀟灑老詩禪何妨剩得驚人句詠遍江山一萬篇明教嵩立玉亭山當崖斷孤亭立竹樹回環翠萬層倒看夕陽深㵎底不知雲外有歸僧玉芝聚冷泉畫廊壁一一塵中堅密身改頭換面轉精神誰知東壁打西壁盡是靈山會上人雙杉屋子甎瓦泥灰假合成周縫隙罅用功深就中有箇安身處多少迷人不識門無用寬佛母堂熱鐵洋銅地獄坑禍胎今日又重生黃梅山下人無數誰解門前掉臂行中峰本湖上草堂山居不買剡中山湖上千峰處處閒芳草白雲留我住世人何事得相關皎然天台石橋橋橫飛㵎上崔嵬㵎瀑千尋吼怒雷五百聲聞看不破至今活葬在嵓隈天目禮過東坡影堂力將正說排邪說夢到黃州與惠州竹屋數椽容老貌大江千古祇東流大慧杲二過秦檜祠路傍一對新華表見說昔年官不小爭知道冷煙疏雨埋荒草蝦子禪杖黎何處問蝦禪回首胥村鎖暮煙一曲漁歌秋浦外腥風吹滿渡頭船夢觀仁雷遷塔一念慈容元不隔何須特地肆乖張平高就下婆心切惱得雷公一夜忙石田薰女官墓隴頭死樹丫微活路口崩亭腳半斜玉骨年深無祭祠變成蝴蝶撲松花廬山佛手嵓清淨身中金色臂匡廬叠叠曉雲開為人隻手無伸處且聽勞生空望崖中峰本迥耀峰草徑離離山影斜寒清入骨半窗紗數聲啼鳥破幽寂晚色不侵茅屋家雪嶠信四青龍泉不假雲雷勢自豪一噴平地盡波濤溶溶流入浙江水飲者如何風調高出生臺何處啼烏去復來朝朝上我出生臺有時粥飯因緣盡脫落皮毛眼豁開曉發葛捲衣邊秋捲蕉曉行寒露草頭飄村中尚未炊煙火且逐雞聲過版橋試心石㟮屼高懸可試心幾回獨立畏崖深忽然腳踏虗空碎石上風生大地春磬山修漂母祠一諾千金肯背盟始知義重見身輕滔滔淮水長流在愧盡王孫怨不平箬菴問三淮陰墓墓石能存漢姓名驚濤拍岸似猶爭功成祇說英雄貴跨下何殊走狗烹西亭懷古千古朱涇得釣名覆舟何處問途程一天霜月無人夜散作蕭蕭折葦聲寶刀隴從來利刃號吹毛萬樹松絲繫獨牢莫謂鈍根虧斷得此中原是活人刀蓮池宏
