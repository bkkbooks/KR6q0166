body:
  text: 京都柏林嗣祖沙門性音重編禮祖像寰中問其般若何為體依樣隨聲他答他句後更無針隙地半簷紅雨落殘花法濟門外刀兵隊隊來阿師掩息未全灰當時若斬為三段安得重新又活埋象潭泳雲門睦州用盡腕頭力負義忘恩忒殺乖要好當初休蓋覆從教千古露尸骸浙翁琰長慶一言坐斷備頭陀萬古芝山翠不磨敢問當年簾不捲不知天下事如何石溪月明覺三皇五帝是何物辛苦曾經二十年一大藏教收不得至今狼藉乳峯前象潭泳日沉野水光明藏蘭吐春山古佛心不用低頭苦尋覓骨頭節節是黃金末宗本天衣毗嵐吹倒葛藤樁扶起韶陽大法幢黃鶴樓前藏不得幾回雁影落寒江介石朋無著五臺凝望思遲遲白日青天被鬼迷最苦一般難理會玻璃盞子喫茶時象潭泳保寧乳寶峯前誓別時一言既出駟難追活埋三尺金陵土道不過人果不歸明極峻明教如説如行炳日星回瀾一柱屹亭亭湖邊安得磨巖石只刻尊僧篇作銘介石朋大覺藤蘿深處鎖寒煙一塔巍巍萬象前縱火不焚龍腦鄮峯高不到青天柏庭文大慧竹篦三尺恨難酬血濺空山草木秋不是自家親骨合應千里竄巖州介石朋宏智正音不振妙高臺楊廣山前事可哀老柏臥波寒影動誰云無伴不成來明極峻石田趁晴來刈石田禾三繞雲邊窣堵波竹引清風松帶露音容雖少語言多愚極慧枯禪青鳳山前古澗邊屋簷頭上更無天而今冷地思量著細擘春雲作紙錢愚谷智禮祖塔華嚴塔山前馬廄普光殿門外牛欄正覺場五十三人同日葬善財走得腳生瘡應菴華禮六祖真塔曹溪滴水自靈源流入滄溟浪潑天多少魚龍爭變化源頭一脈尚泠然憨山清送心上人禮大梅祖塔即心即佛投巖虎非佛非心落網禽莫把炊巾容易展丈夫膝下有黃金恕中慍送福上人禮祖師塔祖師塔是鶻崙磚祇在山邊與水邊一一從頭巡禮遍草鞋依舊自還錢石屋珙謁霜華諸祖塔萬年一念口生埃枯木寒灰活自埋八伯高人扶不起至今無計出頭來靈溪昱二禮石霜圓祖塔西河獅子無窠窟踏破芒鞋賺我來惟有霜花潭上月寒光千古照荒臺明招塔稍硬風頭早已乖更歸暖室自生埋翻令千古成蹤迹枉喫羅山白飯來介石朋藤深蔓短塔纍纍獨眼名龍恐是伊放下泥盤叉手立當年誤殺矮闍黎古智二禮暹道者塔髑髏元自有靈光雪竇何曾抖屎腸截斷婆婆三寸舌至今雙劒倚天長尋谷山禪師塔行盡湘西十里松到門却立數諸峯崇公事迹無尋處庭下春泥見虎蹤洪覺範禮黃龍南祖塔石屋峻層覆骨堆炊巾三展笑顏開輕輕欲扣黃龍角忽地傾湫倒嶽來古梅友謁準禪師塔同條生不同條死覿露全機誰後先一句鶻崙難擘破一時乞與子孫傳洪覺範送元上人禮無準祖塔是他圓照下兒孫自遠趨風掃塔塵昔日烹金文武火至今暖氣尚如春月江印禮虎丘隆祖塔今古雲巖氣象雄千門煙火列朝舂誰知瞌睡當年虎占斷東吳第一峯箬菴問松源塔三督黃牙竅到天鷲峯何處有親傳自知終始無交涉一瓣兜樓拜塔前天目禮禮高峯祖塔二十餘年抱死關那來魂夢落青山臨行白骨無藏處擲向金毛舌上安紫柏可禮建文君遺像陰謀休恨姚廣孝老佛曾傳楊應能斂却殘棋誰勝負閻浮提內兩員僧正法二行無蹤影住無門留得空山像設存衲子莫驚珍御服從來何處不稱尊東叟塔虎生三日氣吞牛養子誰如孫仲謀老屋四櫩天在上此心有愧到杭州栯堂益禮斷巖祖塔千丈巖前曾受屈父子不傳真妙訣蟭螟蟲子正揚聲大地山河一片雪六吉謙禮笑巖老祖塔九鼎曾經一線危黃金充國塔崔嵬聖朝世廟親三到遍地兒孫盡受知呆翁悅示徒從來共住不知名任運相將祇麼行自古上賢猶不識造次凡流豈可名石頭遷學道之人不識真祇為從前認識神無量劫來生死本癡人喚作本來人長沙岑枯木龍吟真見道髑髏無識眼初明喜識盡時消息盡當人那辨濁中清曹山寂人情濃厚道情微道用人情世豈知空有人情無道用人情能得幾多時龍牙遁楊岐乍住屋壁疏滿牀盡撒雪珍珠縮却項暗嗟吁翻憶古人樹下居楊岐會不是嶺頭攜得事豈從雞足付將來自古聖賢皆若此非吾今日為君裁瑞鹿安曉天雲淨濃霜白千峯萬峯鎖寒色驪龍失珠知不知無限平人遭點額明覺顯二門掩還同歲月催石窗經雨積莓苔一牀枕簟淨名老時見斷雲孤月來泥揑金剛水底走筆描菩薩火中行頂門有眼看不見丈二眉毛額下生保寧勇空門有路人皆識到者方知滋味長心地不生間草木自然身放白毫光東山演此段本來無向背要須堅猛力行持金剛五眼通身是萬境來侵莫管伊圓悟勤昔日楊岐老祖翁牽犂拽耙逞神通兒孫帶水拖泥去尉斗煎茶銚不同大慧杲二一口吞盡三世佛正是吾家客作兒爭似璞禪無用處一毛頭上便忘機江上青山殊未老屋頭春色放教遲人言洞裏桃花嫩未必人間有此枝虎丘隆懸崖促拍舞三臺死虎驚忙眼豁開聖地不生凡草木果然親見瞎堂來瞎堂遠少室門庭冷似灰長年不見一人來汝今若解知慚愧那取工夫到一回應菴華三五十三州七百僧驢腮馬頷得人憎諸方若具羅籠手今日無因到淨明急水灘頭下釣時錦鱗紅尾尚遲疑驀然跳出洪波裏攫霧拏雲宇宙低圓通不開生藥鋪單單祇賣死貓頭不知那箇無思算喫著通身冷汗流簡堂機南臺靜坐一爐香終日凝然萬慮忘不是息心除妄想都緣無事可商量南臺安情解泯時金翳眼疑團破盡鬼分贓被人説著心頭事鐵作心肝也斷腸或菴體九衲僧行履豈尋常出匣吹毛不隱藏奪食驅耕全正令東西無復鬼分贓暗撒驪珠成瓦礫間傾鴆毒是醍醐冤將恩報滅胡種舉眼無親真丈夫著腳孤危草不生勿棲泊處等間行臨風闊却噇空口斷送渾家入火坑生獰別是一般村品藻先賢薄後昆掉放孤峯爭合煞棒頭有眼蓋乾坤瞎驢種草不消憑舊閣元關唾手贏湖海晏清還獨步功歸寸刃血長鯨身捨命討冤讐熱血相噴肯便休及到大家無寸土空雙手去占雲頭赤骨力窮擔片板顛癡勃癩豎雙眉驀生做處難名狀佛祖當頭聽指揮一拳也是打爺來未有輸贏莫放開割捨拍盲窮性命嘴咼鼻塌見全材三冬水上打鞦韆百尺竿頭棹釣船寄語兩堂龍象衆毋勞掘地覓青天密菴傑二三月江南啼鷓鴣人行錦繡百花圖離微不犯通消息笑倒西天碧眼胡學道猶如守禁城晝防六賊夜惺惺中軍主將能行令不動干戈致太平性空菴主二不耕而食不蠶衣物外清間適聖時未透祖師關捩子也須存意著便宜節外生枝莫謾尋根源坐斷祇如今鴛鴦繡出頭頭是誰肯輕拋一寸針月堂昌不依本分要參禪賣了山前祖父田赤手出門成活計好兒終不使爺錢松源嶽三心王及第未超情棒下承當翳眼睛勿謂少林人不見黃鸝時喚兩三聲敗壞多年苕帚樁等間拈起定宗綱者些標格天然別不比諸方孟八郎見猶離見非真見還盡八還無可還木落秋空山骨露不知誰識老瞿曇破菴先大地撮來如粟粒九旬禁足誑嬰孩楊岐種子無記時把龜毛眼裏栽無際派盤陀石上共安居水遠山高一事無惟有多情峯頂月夜深移影到階除萬菴柔太平時節息干戈滿路惟聞唱凱歌到此未應輕扎住更須合眼跳黃河無用全大道無南北東西似掌平獨行無伴侶高揖嶺南能大川濟四大聚成元兔角六根縛住白龜毛漚花影裏翻筋斗出沒閻浮是幾遭中峯本四濁水盡清珠有力亂心不動佛無虧眼前盡是家鄉路不用逢人覓指歸一爐古篆一枝蓮目挂寒空萬慮捐清泰故鄉歸便得誰分東土與西天一鈎蘿月照松龕門外無人宿草菴萬億紫金身化主不離當念是同參擬續當年雪隱絃行菩薩行更加鞭驀然自屎不覺臭插翅蒲鞋飛上天月江印全身荷負萬鈞重千里傳來一幅書且喜重闕俱透徹浩歌歸去倒騎驢東山源無相無形本寂寥擬擡眸處轉迢遙蒲團靜倚無餘事窗外一聲婆餅焦龍溪文三月韶光沒處收一時散在柳梢頭可憐不見春風面却看殘紅逐水流止翁報恩門下透難還死款臨岐作麼翻觸著渠儂些子毒直教迸破鐵心肝何菴瓦為貓方撲破伽黎因雨爛無蹤三更不用來分付明日堂堂下籜峯暮翁驢事未了馬事到鈎鎖連環沒斷頭祇管今朝又明日等間蹉過一生休天如則五𧏙蜋負須常嫌少老鼠搬金不怕多祗道臨終將得去臨終却不奈他何病來便作死承當箇是單傳祕密方你若目前無主宰落湯螃蟹沒商量修行如買世間物肯破慳囊事即圓祇把口頭間議論恰如著價未還錢幻軀將逼從心年松下經行石上眠珍重北山龍象衆普通年話幾時圓行中仁年登六十一春秋祇合投間待死休不料業風吹到此又同衲子結冤讐性原明開先寺裏迎賓日禪月堂前索偈時客路如天春似海子規啼斷落花枝愚菴及一片荒田一把鋤翻來覆去用工夫一鋤翻得春風轉也有瓜茄也有瓠石屋珙蔬園全仗衆工夫自己工夫不可無一旦糞多茄子大方知地壯菜根粗笑巖寶工夫未到方圓地幾度憑欄獨自愁今日是三明日四雪霜容易上人頭絶照輝昨日為儒今日僧轉凡成聖不多能翻思昔日靈山老也是其年得越城天隱修未跨船舷三十棒那還何有岸堪登雲龍驚起千層浪無底船招舊住僧嵩乳密昏昏長夜莫能惺佛法真如照世燈點出當人頂門眼依前日午打三更鶴林門二叢林古制育英才選佛場今赤手開日用明明七件事要從檀越信心來一條白棒誰堪喫倚壁長年總不拈不是山僧情性懶萬中無一繼茆鐮隱明綸短拂高提在客司諸方有此亦全非報恩門下青苔滑祇放無毛子飛南菴依不是冤家不聚頭隨流得妙又何求好來扶我剎竿子鐵壁風高振九州汝風杲爛銀高涌響如雷大士全身現幾回要到普陀巖上見驢年保汝出頭來百癡元衲僧荷擔衲僧事極是尋常沒甚奇當念時流泛泛者不思慧命似懸絲呆翁悅六拶到心如牆壁了須知一擊百雜碎丈二眉毛額下生正眼摩醯誰敢須識源清流亦清冤家狹路總無情牢關平地如山險公驗分明不禁行老漢生平一句子從來在子囊收若言更有重分付何異更安頭上頭南澗西華十五年虎頭虎尾話方圓黃梅夜半苦心事又復挑燈為子傳總有定緣休勉強直鈎自古釣金鰲也隨拗曲安香餌縱得魚蝦直幾毫贈別草履初登南客船銅瓶猶𫎓北山泉衡陽舊寺秋歸後門鎖寒潭幾樹蟬清塞選得幽居愜野情終年無送亦無迎有時直上孤峯頂月下披雲笑一聲李翱化門舒卷豈同時出塞還須斬萬機道泰却施林下日捲簾間看嶽雲歸雲峯悅羣峯杳藹留不住遠道依依祗藤屨舊隱蘿龕付與誰寒猿後夜啼高樹明覺顯極目春光水照空岸沙汀草碧茸茸三千里外生靈望獨倚寒藤振祖風澄江依棹碧光流風冷蒹葭雨乍收別夜新吟許誰約白蘋汀上月陵秋雪殘春島路迢迢水盡雲開見碧霄別後誰同此深意祇應孤月共寥寥乘興飛帆到翠峯水光春盡冷涵空道人若問曹溪意祇報盧能在下風禪石飛流濺碧莎利生還喜下雲坡途中若立三千客剔起眉毛不在多栴檀林裏振金毛四顧清風拂幾遭曾許全威作雲雨不知何處是塵勞雲衣輕拂下層巒松檜生風觸袖寒誰問親遊乳峯意百千年後與誰看古䇿風高瓶浪闊春雲片段分清絶金盆後夜孤頂寒去去誰同落殘月鄞江秋晚忽成春況是台星作主人去去高攜古刀尺二千年運續芳塵三十餘年四海間親師擇友未曾間今朝得到無心地却被無心趁出山暹道者二不是無心繼祖燈道慚未廁嶺南能三更月下離巖竇眷眷無言戀碧層撥轉千差向上機攙旗奪鼓不饒伊翻身踞地全生殺始是金毛獅子兒圓悟勤桶底脫時大地闊命根斷處碧潭清好將一點紅爐雪散作人間照夜燈大慧杲相逢相別兩無言萬柳亭邊上渡船勿謂空來又空去舉頭渾見舊山川松源嶽南來揩癢毒蛇頭一口親遭恨未休縱使兩川三峽水到頭難洗此冤讐雪老迎歸笑滿腮俊名喜與太原偕三年祇在天封寺不似揚州聽角來珍藏主三南方浩浩正談禪爭似君家博飯田待我寒衣都補了袖茶來訪钁頭邊𩬆絲不可織寒衣煮字那能療得飢別欲與君安樂法正忙却未有間時青箬笠前天地闊碧蓑衣底水雲寬不言不語知何事祇把心來不自瞞濟顛家住匡廬最上層孤猿啼處月華明如今底事思歸去莫記當年腸斷聲浙翁琰二幾年鏖戰歷沙場汗血功高孰可量四海狼煙今已息踏花歸去馬蹄香冷泉近日飯籮空無奈栽田歲不豐有箇休糧方子妙衲僧競去問天童石田薰孤蹤抹過海門東吳越溪山幾萬重一拜起來還一拜不知何處見圓通虗堂愚二正此補寒忙不徹遽來別我去參方針頭削下三斤鐵與你前途鑄脊梁內心才起病目尋脫體須明不病人腳未跨門先轉步六橋官柳正搖春石林鞏去到雙林見舊遊眉橫新月眼橫秋寒暄未舉宜先問因甚橋流水不流石溪月興化當年打克賓叢林千載話猶存雲黃有棒且高閣祇麼煎茶送出門大歇謙興化當年為克賓棒頭敲出玉麒麟遁菴放過定禪客祇要渠儂眼自明遁菴演三呼三應便翻身六月螺江徹底冰歸到家山人不識一輪明月照廬陵枯禪鏡曾經巴峽聽啼猿萬想千愁舉不全十萬里風吹夢醒月明人在錦江船偃溪聞極目寥寥水照空白蘋紅蓼戰西風三千里外深深意鐵券誰將纍祖翁西巖惠五白紙無端黑筆書分明一句却糢糊青燈夜雨湘江上添得平沙落雁圖千峯積雪初消後萬國春回物物新好箇轉身時節子鐵關難鎖玉麒麟龍從流水響泠泠一曲韶音和不成散作鄱陽湖上曲幾人篷底聽秋聲我居雙徑汝靈山一語臨風要説難紙襖幸然無點墨三冬途路要遮寒雲遮劒閣三千里水隔瞿塘十二峯抖擻屎腸都説了莫教錯認甕為鐘大川濟萬里波瀾一葉舟秋風如箭月如鈎不須更問途中事過得三巴即便休何菴瑞巖有句送東巖未舉分明落二三莫謂無人知此意石橋流水繞松杉少室陸鳳凰山下鳳凰兒文彩才彰羽翼齊鐵網縵天攔不住歸心已在碧梧枝孤雲權烏石嶺頭相見了玲瓏巖畔又逢君臨行無可贈行色萬里西風捲斷雲東山源子規啼血染山花拄杖頭邊興轉賒眼底迢迢皆客路草鞋今夜脫誰家中峯本空拳打入長蛇陳殺氣連雲戰更酣輥到了無干涉處牛頭向北馬頭南無文燦二無數飛花舞曉風天開二十五圓通要知門戶從何入問取溪邊石耳峯動靜何曾涉蓋纏何須更透未生前故園千里今歸去陸有征途水有船東州永佛香浮霧晝霏簾春澗鳴泉雪後添乞食歸來雙樹底散花如雨讀楞嚴見心復儋耳曾聞玉局歸潛龍猶記識天威朱巖滄海九千里一錫間雲自在飛笑隱欣十萬里來傳一信一千七百箇封皮到家的的無文字問你展開知不知千巖長舊日廬山舊眼看阿師有甚不平安放蠅莫打紙窗破風雨落花春正寒天如則心未寧時為汝安落花小雨釀春寒斷橋流水孤山路楊柳絲絲拂畫欄愚極慧白雲飛落劒池旁紙新糊玉一方塔影忽然顛倒卓為渠懸筆寫提綱楚石琦二山上鯉魚生一角忽然𨁝跳上青天俱胝道者無尋處却把天龍鼻孔穿高高峯頂屹雲中八十溪翁也眼空相見莫言行腳事纍他雙耳又添聾野翁同黑漆竹篦光爍爍拈來不用更商量為渠拗作百雜碎看你如何孟八郎如晦二徑山老漢惡相逢要你生吞栗棘蓬丁字腳頭挨得入大家輥入草窠中五十三人病痛深海濤日夜助呻吟煩君大展活人手痛與膏肓下一針絶照輝二生鐵心肝冷面顏平欺佛祖眼頭寬試將一滴曹溪水漲起西江十八灘倒拈禿帚默施功向未屙前盡掃空一大藏經揩糞紙百千諸佛廁中蟲標指堂江水無情去不還惟留兩岸好青山輕雲藏迹能歸岫不向東風向素顏建文帝上人參禮何方去玉几難為指路頭有箇長汀憨布袋如今出化在饒州東生肩荷長長箇楖𣗖煙山煙水去尋師石頭踢破娘生腳帶纍芒鞋喫苦皮破山明二病喫烏藤咄咄歸逢人謾把惡風吹砂鐺土竈埋深澗活煮清泉接鈍機為號空門徹底空今年窮勝去年窮窮坑莫謂難填塞消得龍王多少風本陳忞幾番拽杖思歸省踏斷溪聲到處家煩語倚閭頭白毋好看隔岸柳絲斜玉林琇如今無處覓深山但得心間即閉關吳越不分煙水路醉人秋色月初圓箬菴問雲厭春山日映紅老菴新理旋栽松偶偕清賞多生澀怕見鄰巖大小空三宜盂丈夫事業丈夫成葉茂枝榮根固深九到三登明徹底看來祇怕有心人石奇雲破浪乘風六月來清秋還駕天風去歸去西江十八灘為人好指曹溪路呆翁悅
