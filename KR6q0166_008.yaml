body:
  text: 京都柏林嗣祖沙門性音重編山居三間茅屋從來住一道神光萬境閒莫把是非來辨我浮生穿鑿不相關隱山一杯晴雪早茶香午睡初醒春晝長拶著通身俱是眼半窗疏影轉斜陽雪巖欽春山筍蕨正蒙茸好把黃粱徹夜舂莫謂西來無此意祖師渾在盂中大梅英山靜課花蜂股重林空含籜筍肌明倚欄不覺成癡兀又得黃鸝喚一聲石林鞏紫蕨伸拳筍破梢楊花飛盡緑陰交分明西祖單傳句黃鸝留鳴燕語巢柏堂雅就樹縛茅成屋住拾荊編戶傍溪開是他懶瓚無靈驗惹得天書動地來布衲雍冷風疏雨做新年寂寞寒冰古㵎邊暖閣地爐煨榾柮送窮不用更燒錢冰谷衍草堂秋似廣寒宮金色花開碧玉叢坐久不知凡骨換天香清散月明中天真則二茶罷焚香獨坐時金蓮水滴漏聲遲夜深欲睡問童子月上梅花第幾枝無事山房門不開土階春雨緑生苔此心將謂無人委幽鳥一聲何處來大巍倫竹裏編茅倚石根竹莖疏處見前村閒眠盡日無人到自有清風為掃門顯忠煮菜無鹽懶去賒化糧道者未還家一條百衲拈來看昨夜霜添瓦上花呆菴莊三蕎麥花開曉日晴喚來童子聽叮嚀好將紫芋收歸了𢹂取長鑱劚茯苓處世心如臘月冰住山自笑百無能菜羮且莫熬油者留點堂前供佛燈鼓腹而遊是何日無事乘閒向溪立溪風晚生溪樹寒溪上落花高一尺法杲四買山開地別為家折霧盤雲小徑斜人跡如今到不到侵階祇看紫苔花麻製衣裳草結廬疏人先就我身疏得車失馬都休問萬事我今面壁初山紅草碧萬點螢樹中落落黃茅亭微風吹座更吹我明月照人還照經昨夜秋風忽作威白雲和葉曉還飛幽人不用頻頻掃況此山深客到稀幻有傳豈為老來登眺少却因病後得閒多呼童洗硯無他事重寫當年破院歌雪㵎寰中獨許五臺高無位真人伴寂寥一任諸方風浩浩常空兩眼視雲霄孤月澄五甘貧林下思悠悠竹榻高眠石枕頭格外生涯隨分足都緣胸次略無求自住丹巖緑水傍了無榮辱與閒忙老僧不會還源旨一任青山青又黃深隱巖阿不記年名韁利鎖莫能牽七斤衫子重聯補日炙風吹寂轉鮮颯颯春風和鳥哀清音直到耳邊來爐燒柏子端然坐對月殘經又展開凝眸終日對青山石几爐煙意自閒懸榻久無高士駕劃然長嘯白雲閒天隱修二大千總是一茅廬善惡都從箇裏居長的長來短的短得便宜處失便宜荊溪陽羡佳山水無福消受也難居翠竹蒼松千萬頃紅塵飛不到庭除均實水山中有居薜蘿下山中有人瘦入畫人兮歸來勿久淹莫遣蘿陰逐時化雪嶠信十五春雲裂破一聲鳥七片五片花飛沼清冷莓苔爛石頭新鮮薜荔穿林杪老倒扶寒破衲遮黃昏眠去五更鴉通身是痛醫難治同病相憐誰作家簾捲春風啼曉鴉閒情無過是吾家青山箇箇伸頭看看我菴中喫苦茶秋光一度正將殘野菊無香木葉乾入骨半窗寒雨過愁人不在布衣單半天紅日照青巒草薦封門睡正酣莫道老僧真箇懶起來吹火怕風寒青山茅屋洞雲齊石壁煙蘿鳥合棲誰道我年三十五一身禪病懶如泥昨夜夢回茅屋冷石牀生筍竈生苔糧空正欲尋知己一片白雲溪上來居山道者如何說天際無雲月上竿老兔地邊偷菜喫齒寒嚼嚼又看看一間破屋雲為幕半樹枯梅雪作花爐暖不知人睡去夢回天曉竹林鴉過橋數里道人家亂放疏籬白豆花扶杖科頭望雲到燒香促膝喫杯茶卜築青山身便安黃毛捲雪火爐寒添些骨董煨些粥雲到柴門月已殘三分月色七分秋黃葉疏疏共水流莫道寒光消落盡更留煙雨在枝頭宜花宜雨草分香斷續歌聲山夢長春老不啼樵徑晚離離曲曲水雲鄉從頭簡點總無能枯木巖前老衲僧信步𢹂筐尋野菜攀蘿又上一稜層高居世外絶人求深種良田自有秋禪客扣門無可待與他劈脊一拳頭石車乘讀經未罷眼如醉驅遣睡魔無祕方山堂一枕眠方穩門外千竿玉送涼靈溪昱村煙乞食路迢迢火種刀耕足挂瓢但得攀緣兩字免紅塵無夢到雲霄竺菴威十翻土刪雲驅行者澆蔬引水課兒曹莫嫌活計同流俗佛法長年無一毫清詞喜唱短長調侍者唯留大小空一等住山真快活不分白月與清風愛行千聖頂𩕳路喜說諸方剩下禪身老而今多閣起人來懶得豎粗拳橫塘十里隱菰蒲紅樹村村入畫圖聞說故人秋興好小船昨夜宿西湖師子遊行無伴侶白雲冉冉衆峯高祖師活計埋芳草三界何曾挂眼梢情義合時膠入漆因緣離處火成灰木人花鳥機關絶那有一絲恩怨來了了瞻烏知兩月緑雲芳草意遲遲老年厭說忘情語新竹滿林花滿枝夜深何處是清秋月在青山雲乍收坐倚繩牀開戶牗故鄉天盡望西頭野雲香帶焙茶煙布穀聲頻穀雨前會得一花同淨妙不妨消遣住山緣三有大城無事客五濁惡世太平僧鼻頭烈火沒些子肚裏寒灰有數升呆翁悅五破舊衲衣縫又補郎當茅屋拄還撐不能入衆同寒拾燒火邏齊過一生深山大澤家風冷麥飯柴門笑語香閒踏雪晴乘瘦蹇衝寒野老惠壺漿月色一天茗碗白梅花十樹草堂清此時想箇同消受頻看牀前折腳鐺少眠每笑祥叉手多病嘗嗟燦赤頭起意年來也改作與他兩箇認同流剃草燒田土脈肥離離葵藿滿荊扉山廚自足充清供客至何須更採薇隱明綸二芒鞋踏破寒林色遍地芬芳綴落梅野餐餘香滿舌宮商不是等閒來一榻松風來枕上凉生背後最相宜老儂一種天真樂萬兩黃金不讓伊竺堂溥曉日微明煙樹叢采芝人立板橋東平抽石筍花朝雨淡卷溪雲谷口風東明卓二石幢雨霽月華明自笑頻年夢不生眼底已空今古事襟懷不讓碧潭清廛居閙叢叢裏密提撕門掩春風日又低冷地有時親聽得賣花聲在畫樓西舜田水居壁黏祖偈風吹落簷罥蛛絲雨打開滿徑緑陰花落盡門前百鳥不曾來南石琇船居千尺絲綸直下埀一波才動萬波隨夜靜水寒魚不食滿船空載月明歸船子誠二三十年來海上遊水清魚現不吞鈎釣竿斫盡重栽竹不計功程得便休葉內翰選日集賓迎優禮作偈辭之昨日曾將今日期出門倚杖又思惟為僧祇合居巖谷國士筵中甚不宜惟正普明牧牛十頌未牧生獰頭角恣跑哮奔走溪山路轉遙一片黑雲橫谷口誰知步步犯佳苗普明水草溪邊縱意哮鼻頭無繫去迢遙誰知宇踏皆王化亂踏雲山犯稼苗山茨際湘之南潭之北頭角分明東觸西觸玉林琇初調我有芒繩驀鼻穿一回奔競痛加鞭從來劣性難調制猶得山童盡力牽普明鼻孔生獰不易穿一回入草一加鞭狂心何計能拴續賴有山童把索牽箸菴問少護頭多捕尾月下風前盛溺掃屎玉林琇受制漸調漸伏息奔馳渡水穿雲步步隨手把芒繩無少緩牧童終日自忘疲普明熟徑難忘欲逞馳芒繩在手緊相隨豈容逐草尋芳去晝夜拘拴不憚疲嚴𨍏轢居士面月白蹄墨黑有索有鈎忍饑受渴玉林琇回首日久功深始轉頭顛狂心力漸調柔山童未肯全相許猶把芒繩且繫留普明翻然自肯便回頭滿地殘紅襯草柔故國有懷情未撇暗愁春老尚遲留箬菴問遠邪蹊趨正道步步登高山長路杳玉林琇馴伏緑楊陰下古溪邊放去收來得自然日暮碧雲芳草地牧童歸去不須牽普明暖風晴日柳溪邊俯首循人意悄然花落郊原春色晚相隨歸去不須牽聞谷印戴寒鴉履芳草毛骨馨香見者道好玉林琇無礙露地安眠意自如不勞鞭䇿永無拘山童穩坐青松下一曲升平樂有餘普明寒暑安忙閒得故鄉寬廓任出任入玉林琇任運柳岸春波夕照中淡煙芳草緑茸茸饑餐渴飲隨時過石上山童睡正濃普明百花溪上柳陰中飽食和雲臥緑茸歌罷山童無所事遺鞭枕上睡方濃聞谷印朝隴畝暮茅檐隨時水草明月同閒玉林琇相忘白牛當在白雲中人自無心牛亦同月透白雲雲影白白雲明月任西東普明撐撐頭角臥林中渠我渾忘雲水同為愛山前芻草細夜深乘月過溪東山茨際刀砍水珠斷貫淡泊明志寧靜致遠玉林琇獨照牛兒無處牧童閒一片孤雲碧嶂間拍手高歌明月下歸來猶有一重關普明一道寒光萬境閒寥寥四顧水雲間夜深明月歸來晚照徹空王向上關箸菴問失却牛撞破壁一箇窮身赤灑灑的玉林琇雙泯人牛不見杳無蹤明月光寒萬象空若問其中端的意野花芳草自叢叢普明人牛謾說絶形蹤何異吹風欲滿空若問還源親的旨參天荊棘亂叢叢嚴𨍏轢居士拋靈符瞎正目函蓋乾坤火寒雪毒玉林琇梁山牧牛十頌尋牛忙忙撥草去追尋水闊山遙路更深力盡神疲無處覓但聞楓樹晚蟬吟梁山遠原唱暫時不在急須尋莫待渠儂入草深滿目青山何處去祇消回首自沉吟千巖長見跡水邊林下跡偏多荒草離披見也麼蹤是深山更深處撩天鼻孔爭藏他梁山遠也知隔遠苦無多祇管貪程作甚麼蹄踏蹄兮嘴對嘴明明此物更非他千巖長山坡柳岸蹄痕多子細凝眸是也麼識得跡蹤須著力從今步步要尋它納允菴居士見牛黃鸝樹上一聲聲日暖風和岸柳青祇此更無回避處森森頭角畫難成梁山遠識得形容認得聲戴嵩從此妙丹青徹頭徹尾渾相似子細看來未十成石鼓希夷遠遠忽聞呌幾聲隔溪一望草青青本來鼻孔端然在縱使嵩公畫不成納允菴居士得牛竭盡精神獲得渠心狂力壯卒難除有時才到高原上又入煙霞深處居梁山遠撩天鼻孔要穿渠直待芒繩爛始除向去不須分皂白泥牛合水且同居楚石琦牧牛鞭索時時不離身恐伊縱步惹埃塵相將收得羈鎖無拘自逐人梁山遠甘分山林寄此身有時亦踏馬蹄塵不曾犯著人苗稼來往空勞背上人石鼓希夷騎牛騎牛迤邐欲還家羌笛聲聲送晚霞一拍一歌無限意知音何必鼓唇牙梁山遠指點歬坡即是家旋吹筒角出煙霞忽然變作還鄉曲未必知音是伯牙石鼓希夷歷盡溪山始到家任從落日散雲霞歸來不語程途事何必逢人挂齒牙納允菴居士忘牛存人騎牛已得到家山牛也空兮人也閒紅日三竿猶作夢鞭繩空頓草堂間梁山遠欄內無牛趁出山煙蓑雨笠亦空閒行歌坐樂無拘繫贏得一身天地間石鼓希夷千重雲樹萬重山倒臥橫眠任我閒此景畫圖收不得誰言身在畫圖間楚石琦人牛俱忘鞭索人牛盡屬空碧天寥廓信難通紅爐𦦨上曾容雪到此方能合正宗梁山遠人牛雙遣露真空內外無私萬法通莫立纖塵蹤跡泯堂堂何處不歸宗納允菴居士返本還源返本還源已費功爭如直下若盲聾菴中不見葊前物水自茫茫花自紅梁山遠現成公案孰施功眼不盲兮耳不聾一一音聲諸色相分明黑白間青紅千巖長入廛垂手露胸跣足入廛來抹土塗灰笑滿腮不用神仙真妙訣直教枯休放花開梁山遠殺人便解活人來𩮻頷何妨又託腮甘作畜生行異類重重關鎖盡𤈭開千巖長酒肆淫房任往來莫教腦後露雙腮全身同事全機攝要使羣生眼盡開夢菴格元旦新歲新春雪又濃森羅萬象盡皆同相逢莫認者般事筋斗全拋示祖風師子端百年難遇歲朝春姹女梳粧越樣新惟有東村王大姐依前滿面是埃塵高峯妙太湖山上賀新年萬象森羅笑揭天驚得泥牛吞石虎塵塵剎剎自安然無用寬一年三百六十日今日分明是初一會得一兮萬事周世間出世從茲立費隱容立春無影枝頭一點春可憐大地盡埋塵陳年宿債昨宵盡錯謂今朝又是新密雲悟春風才動春花開春雨相催春水來惟有通元峯頂石依前白蘚與青苔無異來春風春載入春郊春踏春芳春事饒春日釀春春最麗春歌春鼓閙春宵木陳忞元宵元宵佳節同歡樂處處咸然無盡燈火光爍破勝熱面夜神忽喚冷頭疼大慧杲曠大劫來燈一碗照天照地幾人知要看不盡傳持處兜率宮中夢覺時恕中慍春日兩兩三三陌上行春雲踏碎一天青雖然各立風光處又較儂家半月程隱元琦解冬祖師門下絶人行深嶮過於萬丈坑埀手不能空費力任他堂上緑苔生保寧勇寒食禁煙時節陳寒食荒冢野田人啼泣死髑髏上活眼開鬼神茶飯俱打失古湛沖清明日日爽精神風送楊花足四鄰分付子規謾啼血明年更有許多春雪嶠信春朝晴日望飛煙半是人家燒紙錢本有爺娘渾不識却看黃土哭蒼天山茨際瞬目今年三閲月一春半在雨中過西來祖意都狼藉花落風前知幾多石瀾寧結夏揮戈佛日不西流照徹人間洞九幽從此安居無一事休將元妙挂心頭龍門遠西峯結制不尋常穀滿倉兮僧滿堂既得者些根蒂固大家搖扇取風涼高峯妙二一百禪和三十州無繩自縛萬山頭誰是護身誰是殺白雲影裏鐵船浮端午諸方盡喫菖蒲茶惟我自酌青原酒儱儱閧閧發顛狂打落南辰連北斗唯菴然是處人家懸艾虎靈巖但喫菖蒲茶莫言淡薄無滋味畢竟風流出當家南石琇中夏一夏悠悠今已半尅期取證事如何幻華非幻消磨盡祇與從前不較多元叟端祈雨山澗水流如鑿開旱年祈雨為民災不知雲從何處起祇見雨從頭上來師子端遮墺龍王現白龜應身何事出潭遲欲知利物及民處便好為霖濟旱時無相真三久旱山川若火焚龍神何忍臥淵深願興雷電重施雨以濟斯民渴望心謝雨山僧多幸造靈祠却感龍天力護持上澤不知何以報重來聊復謝恩私祈晴天關久鎖不開容日夜滂沱鼓黑風奮性一椎俱擊碎頂門迸出一輪紅高峯妙廓然天地清如洗散盡陰雲見古臺物物頭頭全體露衲僧正眼自應開費隱容解夏百煉黃金鑄鐵牛十分高價與人酬庭前不有花含笑又是東山一夏休東山演一箇葫蘆才倒地滿地葫蘆盡傾倒欲識單傳直指禪今日鬬凑得恰好或菴體老矣無心鑄鐵牛眼前隨分即相酬庭前葉脫西風起且喜凌霄一夏休元叟端禪人解夏東西去莫道腰包趁早涼三界炎炎如火宅不知何處是家鄉笑隱欣中秋從本無心無可傳何須握地覓青天無心恰似中秋月照見三千與大千元叟端土木場中輥一回平生己眼豁然開廣寒宮殿無關鑰撞破髑髏歸去來無文燦謝修造進嚴耆舊重陽金蕊叢叢帶露新采來烹茗賞芳辰浮杯何必須宜酒但有清香自醉人白雲端𩖼𩖼籬根菊正黃妙談西祖意琅琅不知誰解聞斯語堪為宗門立紀綱羅漢南種陽黃菊未成花落帽無勞憶孟嘉但得青山長在眼不妨流水去無涯開福寧時移節換是尋常過了重陽又一陽人事自生今日意黃花祇作去年香愚菴及中峯用處沒疏親道合寧論主與賓却笑汾陽強分別重陽九日菊花新笑隱欣胸中一寸灰已冷頭上千莖雪未消老步祇宜平地去不知何事又登高宜翁觀北禪指座茱萸鮮嫩菊花香暢殺陶家醉倒郎我輩泛觴雖絶分東籬閒玩也無妨石門雅結冬火冷灰寒炭又無大家兀坐嘴盧都冷灰堆裏忽豆𪹼大地通紅火一爐雪巖欽擁門黃葉深三尺冰齒寒泉懸萬尋禁得苦寒忘閴寂梅開不待嶺頭春玉林琇冬至羣陰剝盡一陽生草木園林盡發萌惟有衲僧無底鉢依然盛飯又盛羮冶殳川六陰已極一陽生佛道還同世道亨惟有祖師門下客依前日午打三更千巖長羣陰剝盡一陽生萬國歡呼賀太平日出三竿天四霽五雲獨繞九重城呆菴莊謝雪雪覆蘆花欲暮天謝家人不在漁船白牛放却無尋處空把山童贈鐵鞭雪竇顯凍雲四合雪漫漫孰解當機作水看祇為眼中花未瞥啓窗猶看玉琅玕中峯本捱到虗空粉碎時空花一任眼前飛若還別覓安心法客路漫漫沒處歸無文燦雪覆千峯光不散梅開一樹暗香飄西來祖意盡呈露何用山僧把舌饒芥菴大除夕一年三百六十日今宵正是結交頭移身換步無多子六合清風卒未休大慧杲一年三百六十日日日塵勞事不同今夜勸君都放下管教明取少林宗恕中慍浮世光陰自不多看看又是一年過夜參欲說無窮事奈此風頭峭硬何呆菴莊春回幽谷見梅新雪水煎茶樂不勝誰道夜深年是盡曉來依舊日東升山茨際一年三百六十日逗到今朝是除夕遠年帳目盡丟開摩訶般若波羅密隱明綸送了窮神接好年家家燒紙揖門前隨鄉也把空拳豎聊當兒孫壓歲錢呆翁悅
