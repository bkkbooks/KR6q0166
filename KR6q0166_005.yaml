body:
  text: 京都柏林嗣祖沙門性音重編祕魔巖把斷重津過者難擎杈須信髑髏乾霍山到後知端的同死同生未足觀明覺顯披雲臺林底常懷老藥山皮膚脫盡萬機閒有時月下披雲嘯千古風流滿世間慈受深偶作竹外茅齊橋下亭半池荷葉半池菱匡牀曲几坐終日萬叠青山一老僧全室泐棲雲菴壁自從南嶽來雪竇二十餘年不下山兩處居菴身已老又尋幽谷養衰殘和菴主十方世界目前寬拋却雲菴過別山三事壞衣穿處補一條藜杖伴清閒黃皮裹骨一常僧壞衲蒙頭百慮澄年老懶能頻對客攀蘿又上碧崚𡾓病起病來又病皮黏骨抖擻起來無一物行不成步語聲低鼻孔依然空突兀東山演乞歸老山中六載皇都唱祖機兩曾金殿奉天威青山隱去欣何得滿篋惟將御頌歸大覺璉二千簇雲山萬壑流閒身歸老此山頭餘生願祝無疆壽一炷清香滿石樓偶泊齊題壁百年未了隨時了五十無家不做家知道明朝與後日是何面目討波咤呆翁悅二金山感舊今日重來憶往時影堂淚眼對先師寥寥祖道塵埃重皮髓分明幾個知述懷傳燈讀罷𩯭先華功業猶爭幾洛叉午睡起來塵滿案半櫩閒日落庭花素首座曉過西湖水光山色四無人清曉誰看第一春紅日漸高絃管動半湖烟霧是遊塵天隱至再遊東林寺臺殿參差聳瑞烟桂花飄雪水潺潺莫疑遠去無消息七萬餘年始半年貫休四宣玄舊輦殘雲溼耶舍孤墳落照遲有箇山僧倚松睡恐人來取白猿兒玉像珠龕香陳橫錦霞多傍石牆生辟蛇行者今何在花裏惟聞鴆鳥聲書石壁禪居赤栴檀塔六七級白菡萏花兩三枝禪客相逢只彈指此心能有幾人知前人楞嚴廢寺萬花叢裏畫樓新玉女恁欄天上春明月一輪天外冷夜深曾照坐禪人紫柏可牛頭寺行過多岐又問岐雲林深處到來遲寺僧相見不相語自對夕陽讀斷魯山泰長樂寺山翠一堆中有寺溪流四繞外聞鐘僧寮尋得雲封著虎跡滿庭三兩松智夜坐地爐兀坐燒殘葉童子酣眠喚不譍空盡大千無佛祖老蟲翻下夜龕燈楚石琦點盡山窗一盞油地爐無火冷愀愀話頭留向明朝舉道者敲鐘又上樓恭都寺栽松鈍钁橫肩雪未消不辭老步上苕蕘等閒種得靈根活會看春風長緑條元叟端蒔秧疏陋無能處市問農學稼力爭先近來已得真三昧豎擲橫拋直似弦濟水洸樵薪驀持利斧和根斫那管榮枯長短枝縛去一冬燒不盡有無句子總相隨石潮寧偶題掘溝引水澆蔬圃插竹為籬護藥苗楊柳如絲風易亂梅花似雪日難消海舟慈觀江際小兒埀釣蓬頭稚子學埀綸側坐莓苔草映身路人借問遙招手恐畏魚驚不譍人胡釘鉸金山波中卓出始昂頭裂破長江兩道流隔岸紅塵飛不到三三兩兩渡人舟天童悟空生石石中空可居人而上平如砥建閣其中故曰空生盡道孤危曾不立誰知大地自空擎欲看樓閣空中建請向虗空背上行木陳忞二眠牛石頑皮似鐵骨如鋼鼻孔渾侖管帶忘祇為祖翁田地好從教臥月更眠霜五指山一葉浮天外千山落鏡中誰人揮隻手劃破太虗空憨山青雪彌勒突出全身白玉堆橫拖布袋冷顏開只為衆生多熱惱下生故不待當來琅琊真雙劒峯雙埀天末落羣峯日照寒鋩血暈重在昔虗空曾剖判至今風雨尚磨礲僧贅渡曹溪踏來空翠幾千重曲折曹溪鎖梵宮欲問嶺南傳底事青山白鳥水聲中紫柏可雁宕山展旗邀我過天窗石女雙鸞展笑容卓筆蘸乾龍鼻水等閒題破石屏風枯禪鏡四海名山曾過目就中此境難圖録山前向見白頭翁自道一生看不足惟一潤賣毛帚全身脫落鑊湯後百億毛頭絶點塵而今竿木隨身轉十字街前等箇人夢菴格普請我扣華鯨汝便來區區運水及搬柴為憐逐隊隨羣者伸手從人覓草鞋中峯本二掃地蕩盡從前垃圾堆依然滿地是塵埃等閒和柄都拋却五葉曇花帚上開丐者堂失火死者數人乞兒男女苦相煎拶得無明火現前一夜渾家都喪却死骷髏上不生煙負暄茅屋正當南天寒好負暄太陽勝軟火第一且無煙師子端棄講歸雲棲修淨業百城煙水少司南四十無聞又過三却憶蓮花池上客松聲月色好同參月潭德磬山初闡雲籠高獄倚荊南謾剪藤蘿結小菴獨坐月明當戶照更無餘事到峯尖磬山修血書蓮經重重寶藏一毫端於一毫端揭示看六萬餘言血滴滴黃金難鑄此心肝笑欣二題中峯和尚墨蹟瓶瀉雲興諸佛機不堪把玩涕交揮仍愁玉匣誅龍劒穿屋終隨霹靂飛讀密菴語現成句子缺渾侖把著師僧便滅門七佛傳來正法眼對人喚作破沙盆栯堂益讀此菴語南海波斯持密呪千言萬語少人知春風一陳來何處吹落桃花三四枝中濟才峯藏主血書華嚴塵說剎說熾然說無邊香水血淋漓雜華林內紅如錦五十三人醉似泥月江印三破一微塵出大經血痕腥汗百餘城善財南去無消息啼斷春山杜宇聲血書金剛經四句偈勝七寶施祗園會上百花春須知大士書經血流出如來忍辱身血書華嚴九會埀慈噴熱血十身珍御惹塵埃不因收拾毫端上大地人遭點污來鐵關樞跋淨首座血書法華報親父是誰兮母是誰胸中忤逆是男兒看他義斷情忘處菡萏花開三四枝五屋珙題釣臺圖江空落日暮雲回峽束飛帆樹杪來漢業獨餘風月在青山十里釣魚臺玉芝聚題住山卷山中寂靜好修行柴水開門又現成但得鍋中常有米出家何苦世途行牧雲門挂草鞋方丈門前挂草鞋流行坎止任安排老僧腳底從來闊未必骷髏就此埋僧鞋菊誰將僧履散東籬每到秋深香氣飛莫是淵明訪慧遠虎溪曾帶一雙歸琅琊真思退歸當初只得轉頭銜轉得頭銜轉不堪何似仁王高閣上倚欄閒唱望江南寄鹽官安摧殘枯木倚寒林幾度逢春不變心樵客見之又不採郢人何事苦搜尋大梅常娑羅樹娑羅寶樹我師栽直自龍池一脈來蔭覆乾坤根已固兒孫代代見華開石車乘雲居祐禪師燒香偈一身入定千身出雲居不打者鼓笛虎䭾太華入高麗波斯鼻孔撑白日黃庭堅掩關槁木形骸百念灰溪猿野鶴苦相猜閉門獨掩青松雨笑口逢人亦懶開見心復赴天童終日巖房靜打隈不談佛法口生埃聊通一線開蓬戶梁渚山頭敕命來天目禮西華檀護請訂入山之期書答種田博飯生平願況是名山親到來豈敢相煩更招手挂瓢定在木樨開呆翁悅赴請翠峯別靈隱禪師臨行情緒懶開言提唱宗乘亦是閒珍重導師并海衆不勝依戀向靈山明覺顯二晦跡自怡圖畫當年愛洞庭波心七十二峯青如今高臥思前事添得盧公倚石屏荊南山中思親暮雲秋草遍湖西山色蒼芒望轉迷雁到東吳書未寄一天霜月聽烏啼圓敏耐重坐斷孤危未肯休荷擔傑閣與層樓祖翁活計丘山重得力全歸頂額頭率菴琮西湖北上春園南北筍過牆牆下離離草更香啼鳥野花無問處蒼山牢落下殘陽洪覺範西湖幾度西湖獨上船篙師識我不論錢一聲啼鳥破幽寂正是山橫落照邊道濟二出岸桃花紅錦英夾陽楊柳緑絲輕遙看白鷺窺魚處沖破平湖一點青金粟種松門庭冷落碧苔封獨露當年康祖容為惜雲歸無著處荷鉏帶雨種青松孤雲鑑道話團團相聚火爐頭商略溈山水牯牛一語若投人拍手滿天霜月下西樓中峯本鉏地钁頭邊事洞無痕今古何人解報恩東壁葫蘆才下種鎮州蘿蔔便生根古雪解嘲質庫何曾解典牛祇緣價重實難酬想君本領無多子畢竟難禁者一頭典牛游遊仙天涯咫尺即蓬萊貝闕珠宮次第開遙望羣仙朝謁帝雲霞五色護瑤臺憨山清三懷南嶽祝融峯頂聽天雞直入雲霄最可棲我倦欲從松下臥煙霞酣飽醉如泥軍中作緇衣脫欲換戎裝始信隨緣是道場縱使炎方如烈火難消冰雪冷心腸戍所有感十畝荒園旋結茆芥菘挑盡到同蒿聖恩未許還磨衲且向階前轉幾遭大慧杲二移梅陽示蘊聞雁回始覺瀟湘遠石鼓灘頭莫怨天一住十年秦楚隔木弓重續舊因緣種梅於舍桴從來去住但隨緣此地重歸十五年慚愧山門百無補梅花仍種舊房前呆翁悅二再過嚴灘孤臺不老漢冠新何事長留七里春畢竟煙波無可釣祇堪冷看往來人至海昏前身定是赤頭璨風帽自欹麻苧衣久客瓊巖看詩律袖中藏得海山歸洪覺範二天公無計奈此老時復致之拴索間寄語故人休念我幸因王事得遊山漁婦詞阿儂住在太湖邊出沒煙波二十年不願郎身做官去願郎撒綱辛搖船魯山泰自怡白雲堆裏古家風萬里霜天月色同林下水邊人罕到方知吾道樂無窮東山演採茶拈一旗兮放一槍多從枝葉上摶量全身入草全身出那箇師僧無寸長無文燦滿園雲霧自𢹂筐黃鳥聲中曰正長採罷不知山欲暝風前間唱鉢羅娘靈章蘊劈柴不須費盡娘生力何用輪椎覿面來識得本根絲縷處祇消一爺便揮開夢菴格二趕腳驢終日奔波去路賒蹇驢何事困泥沙最憐客作途中漢祇要將伊送到家謝事龍翔遊雁宕題龍鼻水以見意雨足雲收得暫閒謾將頭角寄空山鼻端一滴無多子引得人人到此間龍翔肱寒食漠漠行雲晴復陰野花埀溼晚沉沉遊人莫怨天多雨況在東皋春已深明教嵩辭宣讓王請數椽茆屋萬株松蒲榻高眠海日紅不是賢王招不起山人祇合住山中資聖銘因事一笑繇來別有因那知大塊不容塵從茲收拾娘生足鐵橛花開不待春紫柏可七尺單前一片地自古上賢從此去未聞故紙裏翻騰尋得西來祖師意呆翁悅宿高安灘臨濟當年遭蹇運灘頭失腳墮洪潮至今月落三更夜尚有冤魂恨未消靈溪昱三月中懷衡嶽幻影偶淹湘尾寺夢魂先上祝融峯相依喜有多情月投老生涯未到窮乞食一鉢翛然手自擎風流活計面相呈村婆不解山僧意猶問傍人作麼生雞冠花潔白異衆卉階前莎草齊曉來和露看祇缺一聲啼真淨文花發雞冠媚早秋誰人能染紫絲頭有時風動頻相倚似向階前鬬未休東山演芭蕉一幅花箋寫未成不知裏許是何情無端夜雨偷開看滴滴當當讀到明靈叟源青箋葉葉映窗紗月翦風裁別樣斜一片衷心都露盡時人莫認眼中花古航栗子刺髼鬆裏久懷胎驀地低頭笑口開畢竟是他時節至圓陀陀地出頭來浮石賢半餅太極圖邊見齒痕阿誰咬破鐵崑崙分明吐出初三月未許泥牛一口吞汝風杲楊柳奈爾縈風帶雨何靜時常少動時多初無惱亂春風意自是春風惱亂他北澗簡橄欖本分叢林輥出來尖頭利嘴果中魁不因咬著百雜碎爭得甘從苦後回清道百果之中回味長嚼來齒頰有餘香祇緣遍體青如玉博得芳名播四方琅琊真櫻桃煉形道士藥爐空枉費生前九轉功一斗丹砂尋不見曉來枝上弄春風率菴琮淡筍淡中其味較偏長瓦鉢擎來分外香翻笑山廚新宴客添鹽著醬不堪嘗夢菴格四方竹筍草本山中盡莽榛剛方此日獨逢君懸知徑直凌霜節才出頭來便不羣籩筍穿籬透石走籩長八月秋風晚更香此際若教連夜雨明年春色滿蒼莨燕來筍點水清池雙翦輕幾莖初出鬬尖新東風昨夜長多少消得園林第一春棕魚陸地翻身亦俊哉金鱗如粟露雙腮可憐不入漫天網跳出夜叉頭上來率菴琮石榴一種靈根傍石栽開花結子絶安排珠璣滿腹無人識直待通紅口自開谷源道苔脯碧波深處長靈苗潮落潮生探幾遭入手自然成片段者回不怕浪頭高浙翁𤥎二花椒突出枝頭顆顆紅包藏辛辣在其中秋風吹得眼皮綻百味珍饈總見功含煙帶露已經秋課顆通紅氣味周突出眼睛開口笑者回不戀舊枝頭無用寬水筧傑出叢林心已空掃除枝葉不留踪看他脫體橫身處接得曹源正脈通谷源道水毬雪老何曾解輥球太虗輥出有來由看他圓轉高低處好在隨流更入流浙翁𤥎姑惡晝夜哀鳴煙水鄉為傷和氣結愁腸聲前有恨憑誰說家醜無端向外揚率菴琮促織費盡工夫聲徹曉天機不露一絲頭夜深咿軋茆櫩下暗織悲秋一段愁蜘蛛立處孤危用處親一絲頭上定乾坤渠儂不是呈機巧要與衆生斷命根淳菴羅網重重布古臺看他幾箇撞頭來臨機不解翻身轉直是教伊死一回何菴等閒掉下一絲頭便見經天緯地謀多少衆生迷活路撞頭來結死冤讐大光古謝猫覓得狸奴最可憐黑花高下巧相聯怡雲會裏慈悲種鼠自翻盆渠自眠怡雲失猫捕鼠生機頗俊哉受他籠檻竟難回勞人幾度空敲碗連喚花奴喫飯來南叟茂求猫堂上新生虎面貍千金許我不應移家寒固是無偷鼠要見翻身上樹時虗堂愚鼓通身擔版面皮橫肚裏虗空過一生善法堂前行正令輕輕擊著怒雷轟彩首座周遮嚴密自心空包裹太虗在箇中生急面皮誰敢觸禾山解打振元風無趣空面桶做時要用工夫用處全無滲漏任是鼻孔撩天未免低頭相就癡絶沖涼簾有月明明籭碎玉無風匝匝起微瀾高堂六月不知暑要在當人放下看何菴鴒飛騰活計遍天涯霧雲迷路不差自己屋頭明白了者回不落別人家斷巖義水茶磨一派滔滔直截過機輪打動鼓風波就中旋下些兒子普與衆生敵睡魔浙翁𤥎機輪轉處水潺潺機若停時水自閒末上一遭知落處十分春色滿人間大川濟水碓深山深處湧清流撥動機關自點頭冷笑三家村裏漢相挨相拶幾時休積堂一派銀河滾滾流機輪觸著轉無休知他米白米未白傍若無人自點頭無量壽閘斷江流十八灘機輪觸處涌波瀾點頭轉轉工夫到舂出驪珠照膽寒古梅友數珠心體圓明空不空河沙諸佛悉皆同阿僧祇劫難窮數祇在當人掌握中覺菴真竹杖香嚴一擊眼如盲可怪無端節目生不是一回親入手人前寸步也難行何菴藤杖骨露筋疏總率真𢹂來恰稱水雲身摩挲又動癡憨興祇想橫拈打箇人雪鴻信琉璃放下放下提起提起一點靈光照天照地丁生通身瑩徹玉壺冰藥火重燒大器成箇裏有心才點著看渠到處發光明浙翁𤥎外面玲瓏裏面空廓然一點赤通紅千年黑暗歸何處剎剎塵塵光𦦨中笑巖寶琉璃棚冰壺凜凜玉龍蟠吐出明珠照膽寒好是山堂無月夜一天星斗墮欄杆率菴琮靈雲石雲去雲來非有意雲來雲去亦無心有無截斷靈何在突兀一峯青到今曹源生風鈴銅唇鐵舌太尖新樓角懸來不計春言外百千三昧法因風說與箇中人巨川海通身是口挂虗空不管東西南北風一等為渠談般若滴丁東了滴丁東長翁淨破衲布袍勃窣老煙痕晝作袈裟夜作衾條縫渾身都裂破朝陽猶自懶拈針夢菴格謝智觀和尚書陶淵明詩文手卷書法真傳自本師松窗為我靜臨池來朝更買澄心紙乞寫淵明歸去辭九溪續放蝶豈是閒閒鑽故紙也知那畔有光輝道人不作莊生夢放爾出頭天外飛芥葊大二偶示西江吸盡接龐公多口馬師真脫空無限家私狼藉後笊籬一柄撮東風徽宗皇帝令繪慧持像頒行復自裂三偈七百年來老古錐定中消息許誰知爭如隻履西歸去生死何勞木作皮藏山於澤亦藏身天下無藏道可親寄語莊周休擬議樹中不是負趨人有情身不是無情彼此人人定裏身會得菩提本無樹不須辛苦問盧能
