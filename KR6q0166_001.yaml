body:
  text: 京都柏林嗣祖沙門性音重編佛誕大術胎中無伎倆毗藍園裏逞風流年年惡水難回避煩惱皆因強出頭疏山如從來家富産嬌兒才出胞胎便亂揮到得伎窮雙樹下始知四十九年非懶菴樞未曾撞入摩耶腹兩手知他甚處安右脅出來魔境現只堪惆悵不堪看天目禮指天指地展戈矛直至如今戰不休假使羣靈都殺盡一身還有一身愁高峯妙摩耶今日産嬰孩剛道天宮降下來不是雞窩生鳳卵分明象子出驢胎千巖長成道瞿曇打失眼睛時雪裏梅花祇一枝而今到處生荊棘却笑春風惱亂吹晦堂心六年雪嶺道方成打失從前鬼眼睛滿面慚惶無著處至今生怕見明星荊叟玨入山去何所圖出山來胡為乎早知今日事悔不慎當初無準範舉頭見星忽悟道黃泥山上生茆草李婆自做老裁衣不翦乾紅翦香皂栯堂益二千年前臘月八黃面瞿曇眼睛活阿僧祇劫喫鹽多苦行六年添得渴月江印今朝正是臘月八釋迦老子眼睛瞎青天白日被鬼迷夜對明星將眼刮朝宗忍出山不耐六年饑與寒含羞又要出人間早知伎倆祇如此何不當初莫入山無準範頭髮髼鬆下翠微凍雲殘雪綴伽黎不須更問山中事觀著容顏便得知石屋珙饑寒難忍道難求又去人間賣口頭不得面皮黃似蠟如何遮得者場羞千巖長王宮不住箇癡騃半夜逾城真怪哉苦行六年誰采你計窮祇得出山來無極觀涅槃靈山山上葛藤樹引蔓牽枝遍地生不得波旬推倒力至今無路與人行佛熙光臨死當休未肯休雙趺一出便難收至今骨節連毛竅暴露春風百草頭虗堂愚彌陀樹林日日談真諦水鳥時時影正觀祇為衆生心未瞥曲勞埀手下雲端晦室明娑婆今日苦情多土曠人稀爭奈何若使一船都載去管教平地起風波竺菴成文殊依稀漁父風波裏倣佛牧童煙霧間鬼魅衆生何日了看看荒却五臺山西嵩壽觀音尋聲救苦太匇匇泥水通身汗幾重一十千人難教化時時記在肚皮中大川濟萬人緣腹臟小白花巖不是真龍華會上現全身者般土子能乖角肚裏時時著萬人斷崖義萬人緣丰姿窈窕𩬆欹斜賺得郎君念法華一把骨頭挑去後不知明月落誰家隱山璨月眉斜印海門孤逐浪隨波不丈夫雙手向人提掇處却將魚目換明珠別浦舟童子南詢尚未回白華巖下望多時長天萬里無雲夜月在波心說向誰石屋珙藍中錦尾沒來由怕爛常將賣市頭須知富嫌貧不愛爭如拋却更忘憂呆翁悅二提𢹂衆生誓願寬衆生度盡願方完不知度盡衆生界手裏籃兒甚處安稽首圓通自在尊好將救苦念頭輕而今處處觀音現耳朵都能作眼睛緣雨蕉維摩毗耶城裏老維摩一默無言詭詐多三萬二千獅子座一時掀倒看如何無用全不二深談絶見知默然早已涉支離當時若遇儂家在擬議拳頭擘面槌無際派詐病從來不可醫文殊特為下針錐事褫一喙長三尺問著依前似鼓椎無準範示疾毗耶方丈文殊亦難近旁看來無藥可醫祇是忌口為上西嵓惠皺斷娘生八字眉者些病痛有誰知文殊針出膏肓穴已是將為死馬醫仲宣孚善財五十三人一縷穿小兒雖小膽如天茫茫煙水無重數買得風光不用錢北澗簡平生擔板逞婁羅參罷歸來事若何一百十城都歷遍識人多處是非多笑翁堪南方經歷幾雲煙收得珍奇貨滿船彈指便風帆到岸一時翻作大光錢無準範城東老姥城東老姥坐蓮臺大地衆生正眼開與佛同生嫌見佛一身難做二如來虗堂愚老婆眼裏有瞿曇故得分明見指端若謂一生不願見信他定是受他顢呆翁悅廣額屠兒放下屠刀處棒打不回頭雲自帝鄉去水歸江漢流退菴休是佛有何成不成癡人說夢信為真須知一自放刀後愈是刀刀見血生呆翁悅羅漢虗空翦碎補虗空驚得金烏出海東喚作衲衣衣下事知君線路未曾通北澗簡金針透處脫規模放去收來得自如掣斷手頭紅線子趙州東壁挂葫蘆妙峯善橫片豎片胡亂搭長針短針信意聯但見日從東畔出不知塵世是何年無準範離離披披破骨董補一孔了又一孔三竿紅日透籬邊看來何止七斤重雪巖欽寒時急用底物趁暖著些針線忽然臘月到來免致手忙腳亂無門開二始見些兒光影要了末後一段若是無門拳頭不打者般鈍漢肩背相挨航一葦觀於海者難為水龍王𨷖富我𨷖貧不費一錢能使鬼天如則破衲當陽舉何人眼有瞳山河并大地祇在一針鋒晦翁明攫霧拏雲謾作狂忽看平陸浪翻江是何尊者從何至彈指聲中即受降了菴欲人間天上無心住多在山邊與水邊彈指一聲龍虎伏腳跟不費草鞋錢唯菴然未動舌頭文彩露五千餘卷一時周若言待月重開卷敢保驢年未徹頭竹巖印志公一聲呱地面兜搜利物心如曲尺凹鍾阜風高枯樹上饑鷹無復整危巢末宗本豐干騎虎圖上了虎背下不得當時莫是錯商量衆生指望𢹂蓮男看你將何作主張智觀慧傅大士不向雙林寄此身却於梁土惹埃塵當時不是志公老也是悽悽去國人雪竇顯身披壞衲片雲寒腳著朝鞋頂戴冠要使三家歸一轍揑砂終是不成團笑翁堪非儒非道亦非禪杜撰修行忒可憐擔閣一身三不了至今八百有餘年一衲介布袋長汀汀上風顛子拽杖回頭等阿誰向道那人元不在汝須知有轉身時天目禮撫背乞錢成漏泄回頭轉腦昧真機可憐閙市無人識獨自肩擔布袋歸拙菴光黑漆拄杖挑布袋轉身忘了率陀天茫芒不顧肩頭重猶要逢人乞一錢中峯本靠著布袋微微笑半似癡憨半似顛看你者般無去就當來成佛待驢年千巖長一汀秋月渺煙沒兩岸寒林挂薛蘿日日下生彌勒佛單單瞞得蔣摩訶漢江布袋橫挑拄杖頭袒胸跣足不知羞可憐內院忘歸去却向人間入下流約翁久花冠卸下辭兜率笑面殷勤處處逢布袋也須都放下一身來往便輕鬆特雲門杖挑布袋走紅塵底事何嘗見得親業識茫茫無本據不知開口笑何人大夢因一文乞與濟誰貧浩浩塵中孰是親自己慳囊放不下又來開口笑何人芥菴大懶殘糞火但知黃獨美銀鈎那識紫泥新尚無餘力收寒涕那有工夫對俗人洪覺範寒拾嚴前掃盡千秋月松下吟殘五字詩敗闕重重都納了五臺山月照峩眉少室陸一笑相看兩弟兄面虎塵土髮鬅鬙驚人有句知誰和唱與森羅萬象聽了菴欲一句子寫不出拖下紙把住筆我今助汝腕頭力動著晴天風雨疾千嚴長四一箇帚拈在手大地塵日日有轉掃轉多轉不休放下自然清宇宙覿面相逢笑未體現成句子筆尖頭書來字字磨今古祇恐芭蕉不奈秋十方世界海中沙諸佛衆生眼裏花一箇竹筒些子大如何盛得許多渣一箇禿帚如許大旁觀未免成話勸君不必費精神撒手諸塵歸去罷呆翁悅四睡拾得寒山笑未休豐干騎虎趁閭丘而今依舊成羣伍不是冤家不聚頭笑翁堪豐干拾得寒山子靠倒無毛老大蟲合火鬬頭同做夢不知明月上高峯虗堂愚初祖萬里孤舟駕怒濤長竿意在掣金鰲連拋兩釣無消息惆悵空來打一遭天目禮二強將不識鼓唇牙胡語如何亂得華若使梁王皮有血定應趕逐過流沙萬里西來老骨楂不遵行止度流沙被人打落當門齒啞子分明喫苦爪或菴體含元殿上藏無計少室峯前坐有因若使當時遭毒手不應千古纍平人復菴賊身未露罪全彰攪得西乾沸似湯項上鐵枷無計脫却來東強土分贓無門開東西走得腳皮穿教外何曾有別傳任你一華開五葉好兒終不使爺錢愚菴盂二祖思量何用覓安心求得心安却苦身三尺雪深曾立處不知誰是雪中人佛國白覓心無處更何安嚼碎通紅鐵一團縱使眼開張意氣爭如不受老胡瞞大慧杲平地無端起骨堆將身活向雪中埋假饒盡得皮兼髓還我娘生一臂來隱山璨三祖渾身燥癢倩人搔入骨搔來身已勞一下被伊搔著了平生癢處一時消水菴一了知罪性本來無絶後何曾得再蘇元是從前風恙病被他斷臂強塗糊癡絶冲二通身是病骨粘皮舉世無人識得伊縱使罪根都懺了依然失却兩莖眉四祖解說深坑得自由單𢹂獨弄逞風流無端纍及栽松老業識茫茫未肯休諾菴肇放下栽松鈍钁頭當胸叉手欲何求本無一法堪傳授空向黃梅結死讐天目禮破頭峯頂紫雲飛三却天書老翠微滯貨雖然無用處不應分付小孩兒少室睦五祖埀埀白髮下青山七載歸來換舊顏人却少年松却老是非從此落人間佛國白種得千山無空地一枝猶挂钁頭邊不因脫賺周家女衣鉢何緣到你傳中峯本幾年活計钁頭邊萬本青松鎖翠煙夢破曹溪天地闊再來不值半文錢少室睦手種青松數百株饑餐渴飲自如如無端借路重相見却被人傳上祖圖退翁休六祖黃梅夜半錯分付才得星兒便亂做大庾嶺頭屙一堆後代兒孫遭點污木菴永七百高僧總會禪眼空四海鼻撩天黃梅若也無私曲有甚衣盂到你傳癡絶冲荷條柴擔眼頭空路入黃梅伎已窮賣得藂林枝葉盡嶺南無地種春風中峯本負舂元是嶺南人十字呼來九不真偷得衣盂連夜走至今無處著渾身退菴英懶融牛頭峯頂鎖重雲獨坐寥寥寄此身百鳥不來春又過不知誰是到菴人明覺顯紫氣氤氳透白雲因逢宗匠指迷津銜花百鳥空惆悵不見菴中舊主人楊無為花落花開百鳥悲菴前物是主人非桃源咫尺無尋處一櫂漁蓑寂寞歸張無盡著鞭騎馬去空手步行歸寂寞菴前路銜花鳥不飛鐵山仁破竈墮禍福威嚴不自靈殘杯冷炙嚮何人一從去後無消息野老猶敲祭鼓聲佛眼遠倚竈為靈不自靈靈蹤斷處一堆塵野老不來敲祭鼓打正因邪別是春佛燈珣蒙山明夜深傳得老盧衣恨殺黃梅老古錐向道趕人休趕著果然落節一番歸雪溪戒鳥窩鳥窩吹布毛紅日午方高趙王因好劒合國人帶刀真淨文佛法有些子言中沒網羅布毛吹起處依舊不離窩無準範老到忘機是鳥窩西湖湖上控煙蘿布毛吹起無多子鐵眼銅睛不奈何寶峯乾一向曾無刀斧痕還他本色住山人無端節外生枝者惹得平空禍到門孝如元馬祖即心即佛口喃喃非心非佛轉不堪八十四人門戶別何曾一箇是同參楚石琦多謝尊前窈窕娘好將幽夢惱襄王禪心已作霑泥絮下逐東風上下狂緑雨蕉百丈曾將古鏡再磨礱拂拭方知啐同一喝耳聲三日後至今獨坐大雄峯佛性泰野鴨高飛落遠汀賺人扭得鼻頭疼思量箇樣無滋味笑不成兮哭不成楚石琦龐居士喪盡生涯賣笊篱白拈隊裏討便宜看他伎倆祇如此也道心空及第歸別峯印趙州無端提起七斤衫多少禪流著意參盡向青州作窩窟不知春色在江南普化盤山會裏錯呈真筋斗翻來笑殺人更與白拈同合夥瞎驢端的眼無筋天目禮振鐸搖鈴恣賣乖大悲院裏赴村齊河陽木塔休穿鑿當甚街頭破草鞋笑翁堪船子驀口一橈全殺活點頭三下便撩天至今千古風流在誰謂華亭覆却船佛照光三寸離鈎摵一橈百千毛竅冷颼颼雖然雙手親分付要在渠儂自點頭無際派三十餘年在藥山鬼家活計豈能傳當時不得夾山老你且耐煩撑破船清溪徹臨濟黃檗棒頭全不顧高安灘上錯商量無端遍地栽荊棘佛法初無一寸長佛照光禍福無門口自召三遭痛棒打驢腰可憐敗國亡家恨萬古春風吹不消天目禮裴相國補𫋴調羮著著先一尊古佛幾經年自從黃檗安名後鼻孔無端失半邊天目禮德山親到龍潭不見龍紙燈吹滅眼頭空一條白棒掀天地滅却西來達磨宗佛照光洞山鳳閣香沉月色親琉璃古殿現全身茫茫宇宙人無數青白傳家未見人笑翁堪石霜三更月落兩山明古道迢遙苔滿生金鎖搖時無手犯碧波心玉兔常行投子青投子水出崑崙浪接連天高地逈秀林巒禪牀略下雲山斷凡聖無蹤海嶽寒夾山散席迢迢到海湄痛棒連打兩俱非父南子北知何處月冷漁歌落釣磯天目禮興化中原一寶有來由拶得君王引幞頭到此若無青白眼當機誰敢謾輕酬雪溪逸曹山金匣香消更漏永沉沉玉殿紫苔生高空有月千門照大道無人獨自行石帆行九峯戴角披毛異類身寒灰枯木眼中塵笑他不具披鱗手徒有臨行一著親丹霞淳雪峯九到洞山緣底事三登投子尚沉吟自從雪擁鰲山後象骨一峯青到今晦菴光元沙滴滴通身是爛膿釣魚船上顯家風時人祇看絲綸上不見蘆花對蓼紅天衣懹汾陽杯酌鋪陳祭祖先更無元妙與人傳同真十智分妍醜面目雖存腦蓋穿無際派楊岐屋老四壁踈雪珠牀上跳猶有閒情懷對白雲發笑大川濟天衣潮回寒浦月明初父子生涯有異途的是破家能做活何愁放却一船魚月堂昌五祖演楊岐驢子白雲關踢踏分明祇等閒百二十斤窮鬼擔一肩荷負到東山笑翁堪芙蓉楷芙蓉帳裏御罏香十二樓分禁苑涼水殿夜闌風月靜昆明池畔舞鴛鴦俍亭挺圓悟認得頻呼小玉聲連忙開眼已雞鳴東山暗號從此滅門戶如今冷似冰笑翁堪應菴楊岐正脈一絲危洋嶼菴中特付衣畢竟虎丘成父子到頭叔姪不傳持東石禮二密菴先師手段咬猪狗持戒如何報得伊破沙盆是正法眼不妨依樣畫貓兒龍池行腳圖燈花𪹼斷鐵牛腳踏遍閻浮入五臺花發笑巖桃浪暖一頭片笠去還來天笠珍天童千年白骨露銅棺佛祖難將正眼看凜凜腥風吹大地等閒觸著骨毛寒弘覺忞滿肚無明沒處發逢人恨不得打殺識利害者諦當看果是菩薩是羅剎呆翁悅磬山刮虗空髓奪露柱胎威音喫棒元要受災晝打三更睡虎嘯真燈照世磬雲開天笠珍雲門澄拈來芒梗勝靈鋒殺活乘時不放鬆倒卓秦山歸去也玉梅香度耶溪風位中符南㵎棒頭如雨喝如雷臨濟頺綱獨振回生鐵心肝含笑面師真得描幾人來呆翁悅樓子你既無心我便休此身無喜亦無憂饑來喫飯困來睡花落從教趁水流孚上座蜆子紙錢堆裏可憐生臭口才開便葛藤蕩盡鬼家窮活計至今古廟絶人行東山源江上撈蝦䲒江風吹面寒西來意不識推出酒臺盤隱商子孚上座涅槃偏正及流通不出禪人一笑中千古平山堂下路依然寒角動悲風笑翁堪政黃牛橋下清波曉夜流橋頭春色轉清幽奇哉底事無遮護何必騎牛更覓牛少室睦郁山主百尺竿頭踏斷橋太虗凸處水天凹古來喫跌人無數不獨闍黎者一交北澗簡李軍容見溈山破壁蕭條自上泥不知背後客官來看他轉笏相承處直得虗空笑滿腮了菴欲湖隱濟書記隨聲逐色恣遨遊祇要教人識便休邏供得錢何處去堂堂直上酒家樓天目禮靈照爺將活計沉湘水纍汝街頭賣笊篱不是家貧連子苦此心能有幾人知無際派不肯守閨閣將身入市廛笊篱無賣處祇好哭蒼天無準範手握肩挑入市中笊篱誰買去撈風不如赤土塗牛奶轉步回家哄阿翁呆翁悅凌行婆年少行藏獨倚樓一家女子百家求祇因不入浮杯眼對鏡看看白盡頭笑翁堪猪頭托起猪頭佛祖不及有問若何肥從口入古林茂二蝦子水裏撈來當陽拈出三界茫茫蝦為子屈張果老倒騎驢圖舉世多少人無如者老漢不是倒騎驢祇愛回頭看自贊貌古形疏倚杖藜分明畫出須菩提解空不許離聲色似聽狐猿月下啼功臣政雨洗淡紅桃蕚嫩風搖淺碧柳絲輕白雲影裏怪石露緑水光中古木新闡提照坐斷南閩第一峯羣魔膽喪虎潛蹤有時一喝春雷動解逼生蛇化活龍長靈卓二面目巉耳搭腮好時如佛笑顏開莫教觸著無明袋百怪千妖盡出來粥稀後坐牀窄先臥耳聵愛高聲眼昏宜字大玉泉皓多年塵世兜搜面百伎全無一伎能自古江南山水窟如何生出者般僧竹菴圭參禪無悟識字有數眼三角似燕山愁胡面百摺如趙婆呷酢一著高出諸方敢道飯是米做藏叟珍不破古人元關元關自破不碎今時窩臼窩臼自碎鷲峯之衣爛却西丘之話無傳大川濟持刀殺人人心不死赤手殺人人心不死伎倆俱盡人心自死橫川珙匙挑不起箇村夫文墨胸中一點無曾把虗空揣出骨惡聲贏得滿江湖無用全強項生來不順情何曾揑怪釣虗名單提木槵百八顆換却大千人眼睛見心復醉傲風顛卒未休杖頭明月冠南州轉身移步誰能解雪覆蘆花十二樓濟顛平生要說拍盲禪掘地如何覓得天三處住山貧徹骨了無衣鉢與人傳呆菴
