body:
  text: 同是點畫所成之字經有心眼者拈掇之便能如畫家點睛令其人生氣溢目對之不覺咄咄呌絕又如人各與鏡面目俾之了了德山之棒臨濟之喝似猶遜此痛快雜毒海所集往哲偈頌皆是物也此真道人本色文字宗門中不得已而有文字必若是而後可也予嘗謂衲僧家不向本分吐露而馳騁聰明炫燿辭句與文人墨士角工巧誇多𨷖靡是何異尼山所云君子而去仁也若使之從毒海游吾知必爽然自失矣是集從恕中梅谷二和尚增訂之後較龍山所作尤成大觀但南中之板流通不廣北方學者恒少見焉因重為刊出其間補入一二亦援梅和尚之例併如梅和尚之言非敢阿好也昔世尊自述在因時求得半偈乃遍書於林葉石壁間以傳示國人予今補刻之役非與前人爭功聊代書葉書壁之勞爾康熈甲午夏六月古柏林寺沙門性音敘昔妙喜老祖居洋嶼菴凡有所唱說侍僧宏首座者皆錄之而名之曰雜毒海葢取老祖所謂參禪不得多是雜毒入心之語也是故後之學者凡遇宿師碩德偈頌佛事等語手錄成帙亦以雜毒海目之其來久矣龍山仲猷禪師一日閱其所錄厭其譌舛遂刪其繁冗摭其精要分類成卷始版行之其心葢欲不負作者之心永永為後學之懿範也或謂師之用心固善其如戾妙喜之訓何然文字語言以不著為尚譬如鴆毒人飲之則死曹瞞飲之則無害在學者取捨何如耳然則是編之行其於法門不為無補故為之說洪武十七年鞔峯無慍題恕中和尚曰吾宗所謂偈頌者借事顯理曉人心地使事理混融純一無雜如醍醐之味薝蔔之香使人鼻舌略經觸受莫不通乎心暢乎體灑然清爽者也又曰宋季咸湻間諸尊宿凡寓興贈別及呻咏字號之類皆有偈頌以四句為準其作至精假使滅去名目而其義自昭顯自非契證深密傍通墳典取之左右逢原用之頭頭合轍而託此以吟暢元旨者不能也予每謂門人曰此作頌偈不易之定論開人眼目之金鍼也是書流布法社其來已久至洪武初龍山閳師為之刪繁摭要分類成集始版行於叢林而恕中和尚乃為之序余觀閳師重編之意甚與恕師所論吻合而恕師作序之意又與閳師刪摭心同因效顰二師徧採古宿遺珠并蒐近代全璧依類增入再行叢林原集共七百三十二首今增八百七十有奇至若泛採阿私則吾豈敢或於見聞寡陋惟高明教之順治丁酉南㵎行悅述雜毒海目錄卷一佛讚卷二雜讚卷三投機卷四鈔化卷五雜偈卷六雜偈卷七道號卷八山居
