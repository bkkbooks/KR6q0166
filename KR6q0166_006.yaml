body:
  text: 京都柏林嗣祖沙門性音重編雪佛三十二相冰骨格八十種好玉肌膚大家瞻仰莫生厭今日有兮明日無標指堂一花擎出一如來六出團團笑臉開識得髑髏元是水摩耶宮裏不投胎蔣生香爐規模脫得已周圓古廟埋藏知幾年拈起一星火種子寒灰發𦦨氣衝天率菴琮香印覆去翻來打一鎚羅紋結角火星飛誰知起滅不停處使得人間十二時野雲南紙出身元是臥藤蘿做處工夫面壁多千里憑渠通信息令人笑殺備頭陀率菴琮轎竹頭木屑盡兜籠綿密工夫不漏風任是兩頭扛得動中間自有主人翁止菴二無絃琴月作金徽風作絃清音不在指端傳有時彈罷無生曲露滴松梢鶴未眠琴到無絃聽者稀古今惟有一鍾期幾回擬鼓陽春曲月滿虗堂下指遲癩可風琴至竟心為造化功一枝青竹四絃風寥寥雙耳更深後如在緱山明月中貫休琴枕仰山推出大溈前一種無絃妙不傳合眼黃昏開眼晝正音端的落誰邊偃溪聞翦渾鋼打就冷光浮兩刃交鋒未肯休直截當機為人處何曾動著一絲頭石門來生鐵心肝解結絞雙收雙放不辭勞從來利鈍不相等不必疑他兩面刀朴菴炭團死柴頭上未全灰打破依然揑聚來輥入紅爐重煅過幾人冷地報春回何菴冷地工夫做已完未應便作死灰看等閒放兩拋三去多少師僧被熱瞞釘鞵黑漆皮膚鐵齒牙脚跟長短莫疑他入泥入水身去不涉程途即到家笑翁堪雪普天匝地白漫漫一片虗凝照膽寒若謂普賢真境界知君已被眼睛瞞混源密綫五色拈來用不偏針鋒影裏要爭先收來放去從機變鐵眼銅睛也被穿無鏡微盛落休言身寄在櫩頭解接吾家向上流煅煉已知無滲漏從教口角似傾湫大川濟船千刀萬斧已成功湖海橫行沒定蹤但得把艄人在後面前不拍打頭風朴菴銛枰木石身心用得親箇中輕重自分明若人會得鉤頭意八兩原來是半觔璞菴傀儡三聲畫鼓兩聲鑼鬼面神頭有許多伎倆百般都做了看他合煞事如何卍菴柔棚頭出沒逞風流引得傍觀笑未休縱使全身都放下頂門猶挂一絲頭斷橋倫憶母雪殞萱花淚濕衣白頭無復倚柴扉去年五月黃梅雨曾典袈裟糴米歸己恭行蠅為愛尋光紙上鑽不能透處幾多難忽然撞著來時路始覺從前被眼瞞白雲端病中一寒一熱又輕甦正覓根源起處無夜半鼠聲成陣出牀頭打倒藥胡蘆東嶼海焙籠篦纏紙裹最風流冷處隈藏未肯休看你通身都是眼自應推出火爐頭笑翁堪獅子峯踞地盤空勢未休爪牙安肯混常流天教生在千峯上不得雲擎也出頭雪竇顯帽黑漫漫地一片頂上聊通一綫等閒葢覆將來多少討頭不見大川濟鍼筒函葢乾坤器量周銅睛鐵眼一齊收幾多利𭪿尖鋒者到此如何敢出頭無門開鍋鈍鐵親曾入爐鞴通身紅煉脫規模看他煑月烹風處漏泄如今一點無子元扇一從透出劒門關無縫團團孰敢看信手等閒提掇起清風凜凜逼人寒無門開鹽官侍者錯商量贏得風流話已行今古有誰知柄未曾搖動足風涼指堂滴漏點點分明箭箭親壺中別有一乾坤若教水泄不通去多少違時失候人浮石賢二跳珠泉竹龍昨夜戲山根一顆明珠吐復吞看即不無爭不得聽教撲碎又渾侖拍掌珍珠泉掌一拍兮足一頓靈泉滾滾珍珠噴直饒是淚滿溪流消得英雄多少恨李又白泥鶯不離泥水見芳心巧囀無聲是妙音眼裏忽然親聽得何須重到綠楊陰浮石賢白蓮碧玉長柯雪色衣夜深看見也相疑數行鷺立波心月拍手驚他不肯飛北磵簡二菊枕青囊誰共實秋葩轉寄深雲病叟家驚起十年湖海夢夜來白髮見黃花葡萄老爛多年一束藤安排上架便敷榮龍鬚卷處驪珠現不比尋常鬼眼睛矮翁水車平生擔版貴清閒萬里無雲始踏翻要得滔天并葢地胷襟流出有何難梅首座茶百草頭邊法戰時槍旗未展露全威直饒陸羽知端的也落吾家第二機松源岳拄杖得處不在高峯亦非淺谿深壑如今幸得扶持老病是為依託神鼎諲多年寒谷古藤枝行遍湖湘採得伊探水敲空俱莫問一般輕重少人知虗堂愚頭角崢嶸勢倚空橫拈倒用疾如風要知得力全提處總在渠儂掌握中率菴琮與奪雙行驗是非芭蕉性命若懸絲橫拖倒拽人無數那箇扶持大道歸止翁拂子馬祖高懸機漏泄趙州馳獻意何深見他毛病拈他底豈有絲毫錯到今虗堂愚煙火輕輕點著便飛星轆轆機輪轉不停不是神仙三昧手都緣些子藥頭靈或菴體草鞵草裏縱橫用處耑南泉曾受趙州瞞衲僧步步承渠力肯向龍牀角上懸吳翁脚下不辭泥水闊鼻頭打溼為人忙無紋印搭千峯面曲盡元關道路長菩提朗綿密工夫打得成通天活路任縱橫看他到處獰如虎無限清風足底生琅琊真出土漢玉環遮顆圜光會也麼泥團打破絕誵譌雖然不受爐中煅曾用工夫細琢磨智觀慧惜煙爐無獸炭坐無氈三箇柴頭品字安家醜莫教輕放出聽他炙地與熏天大川濟牛怨七十餘城一戰收歸家祇說便封矦火瘢未冷重加軛春雨春風暗結愁宜行可二聽雨簷前滴滴甚分明迷己眾生喚作聲我亦年來多逐物春宵一枕夢難成蠶桑空柘盡始心休綿密工夫一繭收爐炭鑊湯得入為人祇在一絲頭默中唯書懷地爐無火客囊空雪似楊花落歲窮拾得斷麻連壞衲不知身在寂寥中簡堂機鑄印袍著金花勒小驄揚鞭幾度月明中黃河界上空來往直至如今未樹功虗堂愚二銷印鐵鞵無底飽風霜歲晚歸來臥石牀一對眼睛烏律律半隨雲影挂寒堂礱米脫得一層又一層磨礱舂打莫生憎須經籭過堪為飯供養十方賢聖僧均實水菖蒲根下塵泥一點無性便泉石愛清孤當時不惹湘江恨葉葉如何有淚珠明顛師一拳石上起根苗堪與仙家伴寂寥自恨立身無寸土受人滴水也難消王沂公懸巖畫蘭嫋嫋春風一樣吹託身高處擬何為從地自作顛倒想要見懸巖撤手時黃文獻苦筍紫衣脫盡白如銀百沸鍋中轉得身自是苦心人不信等閒齩著味全真常藏主祖花造化之功品物情正當生處不言生尋枝摘葉空勞力一朵開時一佛成東山演苔青如蚨血染頺垣漢寢唐陵幾斷魂莫笑貧家春寂莫漸隨積雨上青門古心湻葵絕盡寒暄態唯存向日心東籬有黃菊遙想是知音憨山清十竹城中寸土如寸金幽軒種竹祇十箇春風慎勿長兒孫穿我階前綠苔破清順新竹翦去東西塞逕茆如簪如角透谿㘭未離紫籜皆含節直上青雲始放梢智舷桂花雲根桂子何年植西風吹落黃金屑光浮月影散天香填溝塞壑成狼藉抱璞璉谿梅稜稜瘦骨薄煙籠儘日谿頭送曉風偏向雲中開隻眼冷看荊棘鬬英雄隱元琦臥龍松小橋為枕臥蒼鱗古壑無雲獨露身猶待春雷風雨作崢嶸頭角出荒蓁頂目徹蜜蜂潮鳴一夕到天光日夜奔波有底忙漆桶破時家醜露百千孔竅看郎當靈章縕千花蕊上刺香時百草頭邊得意歸一竅透穿通活路遊行無礙去來飛天封慈二桶底遭君打脫時從前活計頓拋離超然不戀舊窩窟空有層層釀蜜脾窗蜂空門不肯出投窗也大癡百年鑽故紙何日出頭時古靈卓螢不是祥光不是星飛騰活計一身輕看他一點光明處黑暗林中作眼睛古梅友撲燈蠅誰是靈光誰許泊茶毗一箇又還來癡蠅真實癡無比爛額焦頭趁不開呆翁悅跳蚤纔聞腥氣便來鑽引類呼朋暗打團觸著雖然能𨁝跳通身依舊黑漫漫晦山顯紙帳從來不怕惡風吹一片寒雲四面埀幸自明明還白白休來裏許撒珍珠恕中慍竹拂子出得泥來節節高劋除枝葉嗣龜毛等閒拈向華王座大地山河也動搖石門剛蒲團周遮無縫影團圞放倒全身便自安堪笑昔年稜道者無端七度被他瞞素嚴淵雪壓梅柔條能任幾深寒野態便宜帶雪看小立風前撐不住一回斜倚在欄干汝風杲三過雲門竹隖踏遍花溪到老槃一峯天外逼天寒我來夏盡猶堪賞香老蓮房露未乾火筒兩頭截斷見心空一竅能生萬竈風謾借渠儂伸口氣死柴頭上也通紅命根已斷繁枝盡隻眼圓明火宅遊透底為人伸氣處轟雷掣電死柴頭呆翁悅煤抱寂千年終不了全身須要入鄽來盡機備應羣生欲然後身心始得灰笑巖寶餛飩飽齁齁地出頭來扠手當胷擘不開百沸湯中輕轉側三心點破絕疑猜石門剛叉手人前且鞠躬誰知腹裏廣含容鑊湯深處翻身轉齩破方知味不同古梅友湯團工夫做倒圓成處自然潔白絕纖埃深深鍋裏翻身出便是癡人也口開石門剛寄龍團茶與杲和尚蒼壁團團不暗投舌端有眼似離婁莫言茗盌無三寸解問如何是趙州曾文清東坡羮分外濃甘黃竹筍自然微苦柴藤心東坡鐺內相容攝乞與饞禪掉舌尋洪覺範聞角幽幽寒角發孤城十里山頭漸杳冥一種是聲無限意有堪聽有不堪聽東山演秋夜漠漠空江煙水寒虗窗生白亂星攢起看天末來鴻影半落黃蘆半落灘隱明綸二漢宮秋摧秦夷項埽鴻溝百戰功高莫與儔禮樂荒唐溫樹死月華猶照漢宮秋雷篆聽法天龍百萬俱空山曾駐阿香車千年畫棟留遺路雷火蒼煙秘玉書玉芝聚翡翠見說炎州進翠衣網羅一日徧東西羽毛亦足為身累那得秋林淨處棲一初仁竹蝦蟆透出根身易却形心空一切況蒼蠅不知有甚不平事祇是常常努眼睛呆翁悅鐵牛百煉爐中輥出來頭角崢嶸體絕埃打又不行牽不動者回端不入胞胎常藏主謝惠數珠南詢初不失程途收得金剛腦後珠兩手持來親獻我光明烱烱破昏衢應菴華香爐有耳聞聲一似聾無容餘物動乎中灰心未必常如此贏得清煙便不同幻有傳開荒莫愁荒穢草根深要在當人著意真扶起犂鉏能用力石頭土塊也翻身呆翁悅十清種當陽揀辨絕周遮到手休輕放過他若是模糊在敗種異時端的見焦芽雨糓粒粒不教落別處撒開揑聚任他為靈芽護惜還須委土面灰頭應待時栽禾休云辨地實從苗立意栽培識用高手眼當人能逸格根靈土瘦亦堅牢耘草鉏頭如不倦殷勤異草何曾得見聞清楚本根能歷歷野蛙鳴呌任紛紜颺花禾秀蓬蓬花異常祖翁田地盡馨香諸禪且謾生歡喜風雨須防早晚狂車溉雖然眼見是嘉禾也要時時潤澤他盡道榮枯憑雨露機關別有得知麼埀實莖莖且喜漸低頭我亦欣欣望有秋欲得香飄須待熟老農不審忍饑不刈穫到此須防沒脚泥和根截斷始稱奇逢人若問青黃色好舉禾鐮直示伊炊嘗甑香飯熟豁雙眉功用方知不汝欺白汗不緣蓑笠透而今安得頓忘饑洗筆古人信文字字字從此出天下心不欺爾亦有陰騭濯之遺孺子念茲未應失明教嵩竹杖截斷塵根便不同拄天拄地任縱橫赤條條地無枝葉一節空兮節節空陽山授二墨斗竟日孤圓墨與隣竝無文字與人論從他曲直難分辨一綫相通便見真託一自西乾摶量出却來東震表單傳囊藏有意存函葢展託無心口向天菩提朗眼鏡作就規模自一雙向人鼻上露堂堂總饒眼有筋千尺一鑑分明絕覆藏智觀慧二風鳶紙鳶紙鳶耀日參天翻騰翥翼者邊那邊古高僧圖身肥似鶴𩯭毛秋拄杖橫眠大地收千古寒潭清徹底不開唇吻見咽喉天岳晝四埽盡風波圖渠儂特煞用工夫萬頃風濤一埽枯試問未拈苕帚柄纖毫著得力還無送秋濤赴明招汝今遠走豈徒為莫忘扶搖直上時騎取毒龍布雪雨從來佛祖是盲龜禪人出山乞示未著草鞋前毒刺錐人脚見月忘指時青天飛一鶚北風上茅屋欽山樹可北風上茅屋聲聲如折竹竹折我不嗔竹淺雲難宿次覺範洪禪師捕魚韻觀津守網盧公笑若為何如湣計向江湄海門乘興還來迬潮落潮生好趁時夢菴格放艇霜落寒潭秋水清西風陣陣葉舟輕朱涇去後誰堪紹舞棹呈橈幾箇明設餌投筌淺水笑孤寒要得鯨海上看祇有任公堪共語犗將五十釣頭安埀綸撈蝦撈蜆世偏多斷港頹溝奈濁何錦鯉自然潛巨浸不妨千尺擿清波浮定水面飄搖莫問風浮沉先鑑任西東離鉤三寸如能道橈下翻身孰與同應掣不犯清波那得知纔吞香耳便乘時一聲潑剌隨竿起方信歬功不浪施串穿落花流水暮春天釣罷孤篷且晝眠覺後將魚收拾去柳條折向綠陰穿登岸既得金鱗心便休長歌撥棹倚歸舟綠楊隄畔漫天雪無限風光到岸頭市鮮金沙灘外遶紅塵售主難逢幾度巡瑣子骨歸西土去馬郎空自憶閨人得價青錢白鏹出高門爾汝招呼季與昆紅蓼白蘋恣笑傲逍遙澤國度朝昏
