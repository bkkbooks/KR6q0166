body:
  text: 京都柏林嗣祖沙門性音重編題號古帆昔年到岸曾收卷今日因風又展開若要隨他那邊去不妨洗脚上船來淐菴古鏡從來夜叉菩薩面當臺一照沒蹤由就中磨滅不得處黃鶴樓前鸚鵡洲靈叟源古樵空劫已前無影樹撐天拄地赤條條新州有箇賣柴漢收拾將來一擔挑石屋珙一從斫倒巖前樹幾見枯樁帶蘚斑年去年來堪笑我斧頭又被蛀蟲鑽石門來西巖北嶺南邊南嶺東都盧無處覓渠蹤誰知月落猿啼處峭壁懸巖有路通東谷光春谷東君長不老祇在亂山隅一點陽和氣高聲喚得回西巖惠柏巖苗裔忽生巖石裂不同松檜拂雲長蒼蒼無一閑枝葉子落藂林也有香大川濟三枯海一漚未發識根源萬浪千波總妄傳惟有珊瑚枝上月夜深依舊向人圓斷橋瞎驢一踏兩頭空便與尋常路不通寸步却成千里隔憧憧多在半途中瞎翁平生不是眼無筋暗處工夫用得親信步堂堂行大道相逢多是撞頭人璞菴無礙三家村裏謳歌去十字街頭爛醉來紅粉佳人歸宿處伽黎倒搭舞三台大川濟無為噇眠噇飯度春秋佛法從教爛却休若謂全身都放下一絲頭是一絲頭西巖惠無禪平生有口不談玄向上誰言有別傳缺齒老胡元不識迢迢依舊返西天東谷光頑極千古生公臺畔石從來與我是同儔我儂更勝渠些子說到驢年不點頭西巖惠二大嗔迅雹打翻千世界暴雷轟破五須彌直饒驚得虗空墜未抵渠儂性發時山外背向千峯笑展眸楚雲寥落遠煙浮平蕪斷處休相問正恐行人借路問石田熏跛翁坐立儼然無一事出門入戶便乖張脚跟點地不點地自有旁人說短長堂仁病翁見人無力下禪牀已是肝腸不覆藏若是不能知痛癢跨門未免錯商量偃溪聞懶翁埀埀白髮已忘年折脚鐺邊息萬綠百鳥不來花自笑日高三丈尚酣眠佛照光牧翁千簇雲山萬壑流沒蹤由處有蹤由老來收放便埀角不在春風百頭鐵脚死翁青天白日露屍骸大地眾生眼不開若是他家真嫡子三千里外獻棺材良山退翁一從放下便知羞更不人前強出頭寒涕埀頤衣露肘縱橫無處不風流西巖惠樵屋枯者是兮榮者是一刀兩段沒商量盡情收拾歸來也半掩柴扉春晝長虗舟度無華單單祇賣死貓頭萬兩黃金未足酬不比尋常生藥鋪競將百貨誑時流求首座默翁飽諳世事慵開口會盡人間祇點頭莫道老來無伎倆更嫌何處不風流無門開雪收整頓蓑衣禦苦寒自家水牯自家看白漫漫處無香草笛弄梅花過別山大川濟月航平如鏡面曲如鈎落在波心攪不浮索性一篙都摵碎鼕鼕擂鼓轉船頭參寥鼎山萬煅爐中鑄就時十分重似五須彌有人下得全提手爛煑虗空供養伊左溪刖翁幾年抱璞覓知音兩度遭傷恨轉深從此人前輥將去了無脚跡與人尋古田劫初片地沒高低著脚分明三尺泥賣與買人誰是主一犁春雨鵓鳩啼古渡五百生前過一遭那時早已涉波濤即今底事如何舉水若漲時船自高鐵樹劒戟林中識得渠黑皺地沒榮枯試將根底推排看孤硬無如者一枝雪樵拶到孤峯不白處全身猶墮棘林中到家擔子兩頭脫柴自青兮火自紅珠霰飄飄柴在肩且謀燒火過殘年庭前此際無人立爐內憑誰續斷煙元叟端一菴不著劃時全體露擬承當處轉乖張更言萬法歸何處門掩湖山春晝長浙翁𤥎損菴六處虗名不假脩七穿八穴有來由霜風霰雪縱橫入不是愁人也著愁大川濟祖關千重鐵壁勢磨空東土西乾信不通伎倆盡時挨得透脚頭脚底起清風石溪月雪庭一度寒來不可禁森羅萬象盡平沉箇般門戶誰能入著脚分明三尺深大川濟霞浦彤影重重蘸碧流幾回錯認錦江頭及乎光彩消磨盡元是白蘋紅蓼洲月坡明半村都盧祇有三家地分得生涯在那邊犬吠雞鳴無兩樣春風却隔一溪煙閒極岑古桃仙苑春風幾奏名三千年實結初成曾將一點枝頭血換却靈雲兩眼睛希叟曇二凱翁曾飛鐵騎破重圍赤手揚鞭得勝歸沙漠已成歌舞地自皤雙𩬆對斜暉無參得罷休兮便罷休南詢著什麼來由誰知五十三知識門掩西風一樣秋雪巖欽無礙一處通兮處處通如風過樹月行空藕絲竅裏輕彈指推出須彌第一峯月屋靈山話與曹溪指賣弄清光共一家不信但從今夜看又移梅影上窗紗海門潑天門戶難遮掩偏向洪波險處開不是弄潮潮裏漢身能有幾人來業風吹起浪如山多少漁翁著脚難命捨身挨得入方知玉戶不曾關常藏主閒田秦不耕兮漢不耘钁頭邊事杳無聞年來也有收成望半合清風半合雲野翁同木翁不知天地本無根到老全無刀斧痕倩得同行箇上座夜來扶過落花村夢菴依依雲護石牀寒睡裏生涯儘自便門戶打開星似了一拳贏得枕頭眠三世如來眼未醒昏沉妄想立門庭客來不把拳頭豎寐語從他隔壁聽天如則滅堂瞎驢一喝驚天地臨濟家風始大張累及兒孫成話無門無戶可承當浙翁𤥎無牛桃林花落草離離失却繩頭拍手歸幾度野田春水白隔煙愁聽笛橫吹雷峯一聲掩耳不及處百里震驚山嶽摧若是於心無愧底坐觀雲散碧崔嵬驀地如將鐵鼓撾眼頭電影走金蛇誰知昨夜峩嵋頂驚得象王花入牙鐵面百金剛杵力難摧此相何曾墮母胎自是嶺南明上座繡針眼裏出頭來白巖夜半看來與晝同峭巍巍地又玲瓏飛來片雪無尋處空得空生翳一重天菴日月兩輪為戶牗衲僧活計未蕭條不知三十三重外爛却春風幾許茅石關巖巖為壁薜蘿門天巧渾無斧鑿痕百鳥不來雲自合豎拳消息與誰論石田石上栽田世所稀老農聞得也攢眉有人下得泥犁種別甑炊香供養伊方菴者一坐具地生涯誰得知夜來四簷雨誠盡我家私絕待上無攀仰下無依大地空來更是誰祇箇己靈猶不重有何巴鼻與人知谷源道了翁踏斷草鞋抝折拄杖徹底風流匙挑不上擬問如何劈面便掌斷橋倫月浦吞却七箇與八箇十分圓處曲如鈎魚翁一棹百雜碎笑入蘆花萬里秋東嶼海竹房碧雲堆裏六窻深翻憶香嚴錯用心有手不拋閒瓦礫且鋪一榻對清陰空巖有雷隱白日青天轟一下掀翻海嶽裂虗空三冬不用行春令藏在無陰陽地中如翁閒眠閒坐又閒行那事不知何似生因到水邊看白髮秋風吹著兩三莖明叟鑒盡昏昏燭盡幽日輪當午月當秋空來宇宙無知己贏得春風到白頭鏡空垢盡塵消體自圓彩鸞無影不重懸仰山擎處打不破炫耀門庭五百年憩菴外息諸緣魚止濼內心無喘鳥棲蘆老胡開者般門戶帶累兒孫在半途密室祇者方方一丈中縵天網子百千重放一綫道通汝氣黃梅夜半送盧公石翁五百力士拽不動空生頑坐幾風霜巴歌唱罷無人會春草春花滿地香空海返觀觀盡復何觀清淨瀰漫一埽乾月照毒龍眠不得又從平地起波瀾實翁不離生滅是圓常花落花開見自忘老眼一雙無著處秋籬閒看菊花黃無範德山棒落青天雨臨濟喝轟平地雷鎔盡規模空佛祖更將何法示方來無在三回五度打柴扉將謂雲深未得歸把手話來元不似斷橋流水夕陽微足菴日用何曾有欠虧四邊門限不曾移若言知止方為止滄海依然似漏巵毒海洪波浩渺浪翻空一滴無非鴆酒同斫額望風心膽裂不知將底濟魚龍無得夢裏堆藏總是金一場富貴喜難禁枕頭撲落忽驚起四壁清風無處尋無言有口祇堪閒挂壁不將一語當宗乘看他淵默雷聲處未許毗耶老淨名古鼎銘圓中轉轆轆地如盤走珠向外尋覓天地懸殊了堂一諾菴自喚一聲還自應知伊未是到家時如今門戶天然別未到家時也許伊千巖長大徹虗空寬廓猶嫌小透底何妨透頂頭吾祖口門端的窄過窗之後更無牛無菴誰曾架此三間屋又是何人借住來祇把虗空為壁落從教門戶潑天開月舟冰輪夜冷水天空萬里清光一櫂中七百高僧撐不上黃梅贏得送盧公元叟端古畊威音王世墾荒丘留與兒孫種復收今代未知承佃法教人空手把鋤頭天如則晦空千燈不照六窗寒光影俱忘始解看三萬二千人去後至今門戶黑漫漫中峯本逆流出源便遇打頭風不與尋常逝水同浩浩狂瀾翻到底更無涓滴肯朝宗藏山等閒掇轉太虗空百億須彌不露蹤盡大地人尋不見是誰收在一塵中太古七日莊周纔鑿破百千諸佛未投胎衲僧一箇閒名字端的親從那畔來無隱眼見耳閒元不隔晝明夜暗絕商量本來成現何多事切忌當機自覆藏古田七佛如來陳佃戶五千餘卷舊鎡基稻花香熟黃雲老多少兒孫不自知省菴一聲幽鳥到窗前白髮老僧驚晝眠走下竹牀開兩眼方知屋外有青天定叟為人散亂現威儀千劫渾如坐片時白日未曾輕動著西風吹白兩莖眉秋江氣肅風清徧界涼數行新雁度瀟湘一天好景憑誰委兩岸蘆花對夕陽傑峯愚雲菴或淡或濃拖雨去半舒半卷逆風來為憐途路無棲泊却把柴扉永夜開高峯妙無鏡從來一法何曾立祇箇容成也不留却笑雙林還有照尚來臨水自觀頭南石琇無岸舉頭四望白瀰瀰南北東西竟莫知不用篙篙撐到底回頭便是上船時石屋珙石巖千尋拔地青如玉萬丈凌雲硬似鋼望見嶮巘多退步有誰撒手肯承當無敵眼空湖海氣凌雲傑出藂林思不羣古往今來誰是我得饒人處且饒人釣雪百尺竿頭一縷絲沒提撕處急提撕離鈎三寸忽拋却正是虗空粉碎時無文燦友巖最難知是結交心鐵壁銀山百萬尋生死兩岐俱識破石頭大小盡黃金楚石琦梅叟看到南枝又北枝從教兩𩬆白如絲幻花滅盡留真實正是青青著子時息菴百尺竿頭罷問津孤峯絕頂養閒身雖然破屋無遮葢難把家私說向人常藏王古松劫初無地著靈根直下誰知有茯苓子落藂林成大樹萬年不改四時青千巖長小菴箇葉為苫煞有餘一微塵裏搆菴居雖然毫髮無容處萬象森羅聽卷舒笑巖寶山居一池荷葉衣無盡數樹松花食有餘剛被世人知住處又移茅屋入深居大梅常千峯頂上一間屋老僧半間雲半間昨夜雲隨風雨去到頭不似老僧閒志芝菴主山中住獨掩柴扉無別趣三箇柴頭品字煨不用援毫文彩露志菴主萬機休罷付癡憨蹤跡時容野鹿參不脫麻衣拳作枕幾生夢在綠蘿奄志菴主竹筧二三升野水松窗五七片閒雲道人活計祇如此留與人間作見聞和菴主故園歸路隔天涯絕頂閒房且寄家翻罷貝多山月好一棚花影漾袈裟元叟端拙直自知趨世遠疎愚贏得住山深現成活計無他物祇有皺杖一尋湻藏主十二屋架數椽臨水石門通一徑挂藤蘿自緣此處宜投老饒得谿雲早晚過自笑疎狂同拾得誰知癡鈍若南泉幾回食飽遊山倦祇麼和衣到處眠無心閒淡雲歸洞有影澄清月在潭此景灼然超物外本來成現不須參隨身祇有過頭杖飽腹惟憑折脚鐺幾度遣閒何處好水聲山色裏遊行瓦爐爇處清煙藹鐵磬敲時曉韻寒一串數珠麤又重拈來百八不相瞞一瓢顏子非為樂四壁相如未是高爭似山家真活計屋頭松韻瀉秋濤數行大字貝多葉一炷麤香古柏根石室靜延春晝永杜䳌啼破落花邨漁父子歌甘露曲擬寒山詠法燈詩深雲勿謂無人聽萬象森羅歷歷知坐石已知毛骨冷潄泉常覺齒牙清箇中有味忘歸念身老無餘合此情幽巖靜坐來馴虎古㵎經行自狎鷗不是忘機能絕念大都投老得心休怕寒嬾鬀髼鬆髮愛煖頻添榾柮柴栗色伽黎撩亂搭誰能勞力強安排萋萋茆舍新秋夜白荳花開絡緯啼山月如銀牽老興閒行不覺過峯西石屋珙十滿山筍蕨滿山茶一樹紅花間白花大抵四時春最好就中猶好是山家種了冬瓜便種茄勞形苦骨做生涯眾人若要廚堂好須是園頭常在家一日打眠三五度也消不得許多閒循環數遍琅玕竹又出青松望遠山巖房終日寂寥寥世念何曾有一毫雖著衣裳喫粥飯恰如死了未曾燒半窗松影半窗月一箇蒲團一箇僧盤膝坐來中夜後飛蛾撲滅佛前燈飯炊五合黃陳米羮煑數莖青薺苗淡薄自然滋味好何須更要著薑椒一天紅日繞東南自青苗插瘦田布裰半霑泥水溼歸來脫曬竹房前居山那得有工夫種了冬瓜便種瓠設使一毫功不及許多田地盡荒蕪老來無事可干懷竹榻高眠日枕斜夢裏不知誰是我覺來新月到梅花地爐黃獨終無味屋角青松未有花紅葉不題流水去春山多少好人家黃葉任從流水去白雲曾便入山來寥寥巖畔三間屋兩片柴門竟日開蓬頭垢面箇頭陀天下禪和不奈何便是佛來須喫棒如今年老却成魔麥隴風清梅雨住種瓜栽菜人無數聞鼓聲歸喫飯來鉏頭倒挂門前樹石上打眠還打坐松間行去又行來白雲影裏山無數黃鳥聲中花正開冬瓜棚外種胡盧茄子更栽千百株九丈舌頭三百口且同一夏住茆廬四五月裏竹葉落萬木青青梅子黃冷地看他生死事如何空過好時光佛法文章一字無柴牀對客𭪿盧都胷中流出葢天地潦倒巖頭牙齒疎天如則二憶在蘇隄過六橋小番羅帽被風飄滿頭帶得湖山雪幾度驕陽曬不消閒來石上翫長松百衲禪衣破又縫今日不憂明日事生涯祇在盂中灌溪昌我也無端葢把茆碌磚徒自向空拋山深不見一人至打著元來是樹梢何菴月在水中撈不上徒勞𭣟碎水中天夜深山寺開門睡月自飛來到面前橫川珙五稱心稱意可長保上苑名園春日花一箇尖頭茆屋底長年無事道人家七十二峯波面出盧公去後石屏存高歌數曲遊三日圖畫又添僧一尊千丈巖根芋火香天上日輪正卓午東土西乾無祖師白髮老僧七十五佛佛授手無多子祖祖相傳似海深昨夜西風撼門扇天明無迹可追尋栗色伽黎千百結倚松捫腹看雲飛有人問我雲山趣向道春深筍蕨肥愚谷智山中十日九日雨樹頭青子落不住白犬尋蹤入草間驚起竹雞飛上樹恕中慍一樹青松一抹煙一輪明月一泓𭥚丹青若寫歸圖畫添箇頭陀坐石邊無見覩新縫紙被烘來煖一覺安眠到五更聞得上方鐘鼓動又添一日在浮生蓬萊圓生涯滿目是青山一榻翛然屋半間不是老僧誇富貴日閒閒又夜閒閒吳翁谿上坐來久谿聲流水長隔籬煙上竹道者煑茶湯暮翁占得溪房最上層山中拋却一堂僧小園祇在欄杆下自摘青棃雜飯蒸東石背負斜陽出西堰春雲狼藉藏春阪過一谿橋見一邨人聲漸近松聲遠雪山杲乘閒偶出青山去日暮歸來趁野泉谷口是曾風雨過草堂修竹亂春煙玉芝聚梅花昨夜破寒汀曉日初融露尚零無事道人翻有事一枝先供佛前瓶唵香送雨風無力流花水不情啼春枝上鳥今日更分明汰如河半生株守獨家邨愛月常常不閉門枯木作菴伸脚睡風流不減雪峯存惟一潤
