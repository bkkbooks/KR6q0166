body:
  text: 京都柏林嗣祖沙門性音重編投機三十年來尋劒客幾回落葉又抽枝自從一見桃花後直至如今更不疑靈雲勤夜宿花城與酒樓一聞歌管惹離愁利刀掣斷紅絲線你若無心我便休樓子萬象之中獨露身唯人自肯乃方親昔時謬向途中覓今日看來火裏冰長慶稜憶著當年未悟時一聲畫角一聲悲如今枕上無間夢大小梅花一任吹孚上座傑出叢林是趙州老婆勘破有來由而今四海清如鏡行人莫與路為讐黃龍南我有明珠一顆久被塵勞關鎖如今塵浮光生照破山河萬朵郁山主一二三四五六七萬仞峯頭獨足立驪龍頷下奪明珠一言勘破維摩詰天衣懷山前一片間田地叉手叮嚀問祖翁幾度賣來還自買為憐松竹引清風東山演金鴨香消錦繡幃笙歌叢裏醉扶歸少年一段風流事祇許佳人獨自知圓悟勤商量極處見題目途路窮邊入試場拈起毫端風雨疾者回不作探花郎或菴體書堂兀坐萬機休日暖風柔草木幽誰識二千年遠事如今只在眼睛頭陳了翁棄却飄囊摵碎琴如今不煉汞中金自從一見黃龍後始覺從前錯用心呂洞賓揑不成團擘不開何須南嶽與天台六根門首無人用惹得胡僧特地來普菴肅鼓寂鐘沉託鉢回巖頭一拶語如雷果然祇得三年活莫是遭他受記來張無盡頂有異峯雲冉冉源無別派水泠泠遊山未到山窮處多被青山礙眼睛白楊順枯木無花幾度秋斷雲猶挂樹梢頭自從鬬折泥牛角直至如今水逆流寶華鑑黑漆崑崙把釣竿古帆高挂下驚湍蘆花影裏弄明月引得盲龜上釣船伊菴權幾年箇事挂胸懷問盡諸方眼不開肝膽此時俱裂破一聲江上侍郎來分菴主三更月下一聲蛙撞破虗空共一家正與麼時誰會得嶺頭腳痛有元沙張九成從來姿韻愛風流幾笑時人向外求萬別千差無覓處得來元在鼻尖頭蔣尚書趙州狗子無佛性萬象森羅齊乞命無底籃兒盛死蛇多添少減無餘剩一源寧清風樓上赴官齋此日平生眼豁開方信普通年遠事不從蔥嶺帶將來越山鼐大地山河一片雪太陽一照便無蹤自此不疑諸佛祖更無南北與西東斷巖義掃盡葛藤與知見信手拈來全體現腦後圓光徹太虗千機萬機一時轉日本覺阿侍者留贈送曾侍禁冷匣秋波射斗星鐵衣隨從古霜清宣池莫問當年事一片威風動地生明覺顯贈魁天紀拈筆詩成首首新喜來豪呌欲攀雲難醫最是狂吟病我恰才痊又到君圓至贈憲司張大使眼光爍破人肝膽挂起崚𡾓鐵面皮萬事一公都了辦驚天動地丈夫兒千巖長送李宗遠歸廣東三山木落雁啼霜虎踞關頭買小航明日相思望南斗水流不盡楚天長見心復四太平身退更何憂歸老南山問故丘一色梅花三萬樹夜和明月醉羅浮聞説高矦氣膽狂校詩多在白雲窗秋來椰子甘如蜜寄我須緘五百雙鸚鵡杯深泛紫霞風流渾訝謫仙家錦袍留客催春燕開遍東園豆䓻花留典座寒山爨下供燒火拾得堂前拾菜渣贏得坐籌香積國後園茄子又開花行可送嚴使君端溪歸越中江南木落雁天高一路青山送客舠應訪寒山舊苕迹松門斜日聽秋濤退翁儲送麻居士紗帽山儀白苧袍遠投孤頂近吾曹攜來七尺霜前竹劃斷天雲不放高明覺顯醫士牙齒分明一具骨十中今祇二三存先生若不重栽種老去如何咬菜根元叟端衆生病已在膏肓舉世誰傳奪命方是草拈來都是藥何須九轉透瓶香無學二話頭一則耆婆藥大藏諸經和劑方抹過三途開口笑不勞針砭起膏肓相士人説先生相最靈試將一問問先生山僧未出母胎日蓋膽毛還有幾莖東巖日風搖翠竹聲敲玉雨洗羣峯色潑藍妙相堂堂祇者是先生有口怎生談谷源道雙眸炯炯逼人寒驗盡賢愚瞬息間父母未生前面目應須返照自家看拙菴光面如生鐵鑄崑崙有底榮枯到你論謾説青青亭畔竹春風幾箇有兒孫無文燦長短生成都一樣賢愚眼裏分中上問君具底摩醯眼法報化身作麼相智觀慧贈了空羽士劒光電繞蒼巖裂阿母金盤進紅雪攜手一笑三千年更約乘鰲拾海月笑隱欣卜士卦盤掇轉昧真機禍有胎兮福有基昨夜孛星移一位先生睡著不曾知石田熏無位真人赤骨律面門出入有誰知太虗元與渠同壽庚甲憑君仔細推癡絶沖汝鑽龜甲我鑽心鑽透靈源值萬金𪹼地一聲爻象露六爻平靜絶追尋萬峯蔚演史問行伴手一烏藤獨坐長年對碧層不聽子談興廢事那知身是太平僧一翁如吳征越戰好崢嶸幾度春風青草生側耳聽渠話來歷眼頭千嶂陳雲橫孤雲權歌者三撥琶琶唱渭城喉音嘹喨遏雲行如何解奏無生曲佛祖從教努眼睛百癡元裁縫鄱水一條生白練廬山半幅舊青蘿李生提我袈裟角補得渾崙不欠多中峯本手攜刀尺走諸方線去針來日日忙量盡別人長與短自家長短幾曾量石屋珙得於心兮應於手補得虗空無滲漏若有絲毫未了時更向針鋒打筋斗覺首座漆匠裏面盡情灰得了外頭方始好揩磨雖然本有靈光在也要工夫發用他石屋珙鋸匠拽去推來妙意同作家相見密施功通身手眼能回互盡在當陽一線中無趣空鞋匠出格工夫衆所推笑他時輩亂針錐腳頭腳底通霄路明月清風步步隨潛書記鑄鐘匠野店小橋外黃昏欲雪時一聲誰側耳千古喚愚癡應菴華天下有名何鑄鐘遠來相訪老巖翁吾家火冷冰生也且趁諸方爐鞴紅千巖長吏人活捉生擒百種囚敲枷打鎖問來由箇中一字能通變活却從前死路頭無準範刀鑷提起霜刀風凜凜二三四七也低頭看他立地為人處毛髮不存方始休浙翁琰剃了又長長又剃一年幾度遠煩過大夫祇管來求福我福如何有許多石屋珙送僧禮寶陀然指是真精進實奇哉一朵蓮花指上開要識觀音真面目此回親到寶陀來𡽗巖送鐵山道人禮寶陀腳跟下鐵山萬仞眼睛頭白浪千尋不於者裏承當去更要重參觀世音中峯本送無極道人禮寶陀道人無事發狂心涉水登山海外尋一拜起來還一拜不知屋裏有觀音虛白旵送觀上人禮補陀補陀巖畔去何求不見觀音誓不休見了觀音當自笑元來胡餅是饅頭天如則送智觀慧侍者禮五臺清涼欲禮不辭勞往復炎天萬里遙勘破老婆舌底路歸來正好語聲高呆翁悅二文殊老不避羞慚剛道前三與後三汝去更詢多少衆看他又爭放癡憨送僧省親娘生面目既分明遠不疏兮近不親試向途中問歸客不知誰是倚門人癡絶沖衲衣換得綵衣斑佛國宣傳及第還母問子供何職事空王殿上翰林官藏叟珍白頭八十雙親在日望南方應斷腸一見掀眉呈舊面莫言無物獻尊堂虗堂愚今生父母當親近從本爺娘子細看動轉施為全得力一回舉起骨毛寒別浦舟空花要覓生時蒂陽𦦨須尋起處波不是出家恩愛重夢魂偏在故鄉多楚石琦贈真淨諸葛昔年稱隱者茅廬三顧出山來松花若也霑春力根在深巖也著開香城順寄佛印粗沙施佛佛欣受怪石供僧僧不嫌空手持來還要否更無一物可增添蘇子由答子由空手持來放下難三賢十聖聚頭看箇般供養能歆饗木馬泥牛亦喜歡佛印元寄臥雲菴黃金園裏馬交馳徑寸多成按劒疑月曬梅花千樹雲臥雲一枕夢回時虛菴實呈妙喜不是心兮不是佛通身一串黃金骨趙州參見老南泉解道鎮州出蘿蔔吳學士寄育王東堂靈源大士居昭默橫川老師居山寮高風相去三百載人世南朝自北朝栯堂益賀淨慈起千佛閣畫五十三參改路立兩牌門千佛束之高閣了百城煙水一毛吞縱饒別有通天路也落南山第二門空海行者了身不若了心休了得心時身不愁若也身心俱了了神仙何必更封侯應菴華三宿解田夜宿西山居士家圍爐相對話生涯從來無一絲頭許自是勞生眼裏花祥禪濁港江頭送別時碧雲秋水淡依依莫嫌老拙疏慵甚他日重來扣竹扉寄萬峯蔚黃花滿目秋白雲端坐碧峯頭無賓主句輕拈出一喝千江水逆流千巖長寄仰山無念學首座五派傳來臨濟宗入門一喝露機鋒老婆心切能容易試看泥蛇變化龍萬峯蔚寄翠峯頂長老行處要教機路絶説時莫遣意根生如來大寶華王座不比尋常黑漆棚恕中慍三寄妙菴首座黃獨煨來可療飢心如牆壁眼如眉趙州去後參尋少有箇拳頭豎向誰寄法姪衍斯道除建元二妙林間五色鸞赤霄終見散飛翰藤州事業非難繼況是胸中宇宙寬東嶼和尚相別於今八載餘君匡徒衆我間居白雲流水乾坤外終不相親在寄書元叟端鐵鞭和尚思量四句寄承天湊得完全缺半邊頌又不成詩不是如何拈出向人前訥堂辨寄歸宗華姪禪師坐斷金輪第一峯千妖百怪盡潛蹤年來又得真消息報道楊岐正脈通大慧杲寄烏龍長老雪帶煙雲冷不開相思無復上高臺江山況是數千里祇聽嘉聲動地來明覺顯二寄內侍太保千尺寒巖噴冷聲草堂雲淡竹風清蒲團時倚無他事永日寥寥謝太平寄訊竺菴和尚春色初浮千佛嶺鐘聲遠度六朝松法堂乍起天花落人在寒雲第幾重南菴依三寄木菴大師喝後曾聞三日聾西江自此起宗風等間拋出一輪月高挂好山第一峯法道埀秋近日來承虗接響浪栽培吾家不鬬門庭好祇愛當人眼正開寄奐天章并諸名勝石牀煙裊瓦爐香千聖頭邊較短長兩口果然無一舌莫將消息到諸方南石琇二堂堂臨濟下兒孫重按輕提廓頂門七穴八穿無味話何妨嚼碎渾崙吞初到善溪慧照菴寄張無盡世辨不妨無骨舌好山難絆自由身從他折腳鐺兒笑且欲南來識鳳麟洪覺範二寄石頭志菴主世途巇𡽗鼻先酸折腳鐺尋穩處安誰見睡餘間振䇿松風吹耳夜濤寒寄淨慈平山和尚領破蹄穿五百牛南屏寺裏一欄收皮毛換得光生也拽耙拖犂再起頭石屋珙天目和尚翁翁八十再生牙爛嚼虗空吐出渣撒向玲瓏巖畔樹枝枝葉葉是曇華希叟曇寄百丈友人多時不見牯牛蹤夢斷雲山幾萬重莫是隨羣貪水草被人拴住大雄峯獨立邁上鐵菴紅爐𦦨上火星飛誰解當頭下一鎚將謂鐵菴渾是鐵頂門一著爛如泥何菴辭山水牯從來不受穿鼻頭牽著便風顛請公收取斷繩去放與林泉自在眠慶首座吳必東請偈百草頭邊千聖眼一毫端上萬重關更無佛法并玄妙堪與知音共往還應菴華喜圃田韓少府見訪忽聞梅福來相訪笑著荷衣出草堂兒童不慣看車馬爭入蘆花深處藏胡釘鉸答吳元昭通身一具金鎖骨堪與人天為軌則要識臨濟小廝兒便是當年白拈賊大慧杲聞法雲大秀遷棲賢以此寄之七百高僧戰法場盧公一偈盡歸降無人截斷黃梅路剛被迢迢過九江溈山秀清菴和尚住南華當機一喝怒雷奔攪得黃河曲曲渾今日斬新翻舊轍曹溪無底水無痕鐵關樞酬李仲思宰相晴雲萬疊裹羣山巖瀑千尋落樹間定裏驚傳玉駕至祇應來奪老僧間中峯本二歸鞭未舉且婆娑平地須知險處多休把世情名字相纍他巖穴老頭陀酬馮海粟待制無言童子拂香臺報道長沙學士來爛煮橘皮砂罐冷幾年生意喜潛回答八山居士太極玄關寶鏡臺三家活計總塵埃道人別有安身訣不打三家路上來玉芝聚訪俞秀才萬疊雲山未得歸寂寥心許老盧知江城雨雪書名紙不謁鴻儒更謁誰明覺顯趙提宮請偈言前薦得已天涯句後承當路轉賒一擊鐵關如粉碎水天空闊雁行斜大慧杲二寄無垢居士上苑玉池方解凍人間楊柳又垂春山堂盡日焚香坐長憶毗耶杜口人和宮使侍郎頌送入莞山菴此山已是勝天台峯頂寥寥正眼開無限水雲難湊泊却容掃地相公來應菴華李香嚴乞偈百家諸子徒糟粕藏海波濤赤手翻穩坐家堂誰是主未生前事問香嚴箬菴問二南湖煙水欲留人肯負臨溪把手吟一語不傳真祕訣要將物格話重行穀日答唐祈遠行腳心頭已悄然不禁放曠好林泉松風水月終何物結我多生聚首緣牧雲門酬王奉常煙客銀鈎鐵勒法堂懸手闢生機點畫前百萬英靈齊斫額直教人看眼睛穿退翁儲秋日寄懷黃介子高名少小重如山選佛猶嫌豈選官頭戴華巾離少室手攜席帽出長安弘覺忞二玉局文章都尉禪脫空師語亦傳無人過與價三百贏得雙眸貫五天辭石溪請出世宗師萬萬千祇餘迦葉守枯禪老僧若也隨流去辜負山居三十年千巖長參天通和尚聚寶由來帝里山碧峯雲鎖絶躋攀試看木馬嘶風處火裏清冰六月寒玉芝聚二次董兩湖韻君如五柳常酣酒我似溈山不學禪塵劫去來同一笑謾論人世此何年別友世有百千間日月人無一點好身心知他為甚麼邊事添得茫茫業海深中峯本二酬李思宰相機裏藏機復見機秋霜點點透征衣話殘夜壑三更月又約天雲擁毳歸答嵩禪師因嵩師戲作悼詩寄之師作此偈畢擲筆而逝道契平生更有誰間卿於我最心知當初未欲成相別恐誤同參一首詩如布衲答頑石和尚佛法從教爛便休多年紙被自蒙頭生涯祇有數株芋熟在山中亦懶收千巖長答雪竇顯禪師一兔橫身當古路蒼鷹才見便生擒後來獵犬無靈性空向枯樁舊處尋韓大伯雪中懷洞如敗絮相親三十年冰霜同冷鐵同堅更添門外雪盈尺老眼能堪榾柮煙玉林琇答竺元和尚此時有院不愛住聞在江皋自隱居劫火灰飛大千界普光心印祇如如元叟端寄圓悟和尚出林依舊入蓬蒿天網不可逃誰信業緣無避處歸來不怕語聲高華嚴覺訪抱璞和尚芒鞋竹杖為尋君山塢重重煙火村及至相逢無可語梅花十里一溪雲雪嶠信寄信上人一瓶一且隨緣此事時時強為宣知己不來春漸老孤峯皎月對寒泉東山演二寄舊寄書未到他先望傳語不來我便知度日林泉無世慮斂眉偷看白猿兒寄雪竇禪師茅茨函丈古臺垣乳決青層雪卷門豎箇拳頭知己懶肯將鐵券纍兒孫靈章蘊寄崑崙業風吹破進賢冠生死關頭著腳難六百年來今一遇莫將大事等間看萬世尊寄無準和尚鱉與猿交割不開兄呼弟應似忘懷及乎説到誵訛處又却心肝不帶來訥堂辨寄曉菴和尚天南每遇長沙客盡道黃曇古佛安博飯種田同百丈高風颯颯逼人寒呆翁悅三寄如皋范就卿今時難得真居士常憶東皋老范禪大似衲僧乾嚗嚗逢人開口氣衝天柬興隆主人借閲大藏盡道拭瘡疣故紙是非今古數如麻果然拭得瘡疣否一一從頭要驗他寄吳江草堂神山聞説養親在草堂此情遠慰我憂忘臨流半楊曾懸否蒲履同編供母嘗天笠珍悼惠書記惠初不死而言死空本無情似有情手把遺書一揮淚秦溪三夜雨連明空東山悼雲巢和尚人傳師死已多時我獨躊躇未決疑既是巢空雲又散春深猶有子規啼訥堂辨二悼東山和尚藕絲牽出繫虗空溼紙拈來裹大蟲此伎施呈今已矣不堪老淚灑東風悼人二十四年春夢斷百千三昧死中參可憐得病無多日問訊重來又入龕日貫生了死了復燒了恰似從前總不曾見説茶毗相送日柳條分遍一千僧希白天童侍者在靈隱作侍者死三喚聲中負不平興師百萬欲攻城誰知菡萏峯前路削木書名又伏兵雲外岫弔善禪師出輪回又入輪回究竟何曾有去來昨夜冰河中發𦦨虗空燒作一堆灰保寧勇悼志公大士去年曾涉白雲巔投老相逢亦偶然蟬蛻君今成敗葉春蠶我已作三眠洪覺範二悍喪未減春爐暖丈室偏宜道骨寒擺手便行呼不應間名在世試除看雙髻峯有懷高峯和尚雙髻峯深古道危不來夜半扣柴扉六年底事成遺恨寂寞空山啼子規中峯本二客中聞訃訃音遺我客牀頭話到輪回鬼亦愁肉眼未空今古夢滿天霜月曬骷髏悼或菴和尚圓寂時以硯遺贈翩翩隻履逐西風一物渾無衣袋中留下陶泓將底用老夫無筆判虗空曾侍郎題晦堂中無門戶四無旁學者徒勞捉影忙珍重故園千古月夜來依舊不曾藏吳恂二廬峯居士舊門人描得師真的的親大地撮來成箇眼翻騰別是一般新扣角身前身後事茫茫欲話因緣恐斷腸吳越江山尋已遍却回煙棹上瞿塘圖澤過孫山人故居溪邊野竹映寒沙茅屋青山處士家燕子歸來寒食雨春風開遍野棠花見心復悼古林和尚古往今來一欠伸茫茫劫海起塳塵虗空昨夜翻筋斗驚倒靈山會上人月江印四哭徒舜逢源精明見道出常流造極登峯尚不休聞説百骸同鶴瘦可憐未死已枯髏法門非福歎承天爾不匡徒也棄捐此土他方雖趁俊鉢盂無底倩誰傳蝸角壁黏縣學帖蠅頭手録劒南詩觸人鐵石心腸碎勝似三聲猿呌時歷正沈老居士自化七十六年渾是夢拖來拽去總非真全身放出光明藏疑殺閻浮一界人智觀慧
